  Object.values(profile.conditions||{}).forEach(c=>{
    c.expectedLift=weightedAvgPairs(c._vals||[]);
    c.totalWeight=Math.round((c.totalWeight||0)*100)/100;
    delete c._vals;
  });
  profile.bestConditions=Object.entries(profile.conditions||{})
    .filter(([,v])=>v.count>=2 && Number(v.expectedLift)>0)
    .sort((a,b)=>Number(b[1].expectedLift)-Number(a[1].expectedLift))
    .slice(0,5).map(([key,v])=>({key,count:v.count,expectedLift:v.expectedLift}));
  profile.weakConditions=Object.entries(profile.conditions||{})
    .filter(([,v])=>v.count>=2 && Number(v.expectedLift)<=0)
    .sort((a,b)=>Number(a[1].expectedLift)-Number(b[1].expectedLift))
    .slice(0,5).map(([key,v])=>({key,count:v.count,expectedLift:v.expectedLift}));
  profile.avoidWhen=profile.weakConditions.filter(x=>Number(x.expectedLift)<-.4).slice(0,4);
  profile.bestEffects=Object.entries(profile.domains||{})
    .filter(([,v])=>Number(v.expectedLift)>0)
    .sort((a,b)=>Number(b[1].expectedLift)-Number(a[1].expectedLift))
    .slice(0,5).map(([domain,v])=>({domain,expectedLift:v.expectedLift,count:v.count}));
  profile.weakEffects=Object.entries(profile.domains||{})
    .filter(([,v])=>Number(v.expectedLift)<0)
    .sort((a,b)=>Number(a[1].expectedLift)-Number(b[1].expectedLift))
    .slice(0,4).map(([domain,v])=>({domain,expectedLift:v.expectedLift,count:v.count}));
  delete profile._overall; delete profile._improved;
  return profile;
}
function buildMoveEffectProfiles(actions=null){
  actions=actions||allForecastActions();
  const profiles={byMove:{},byType:{},byCategory:{},byContext:{}};
  (actions||[]).forEach(a=>{
    if(!a || a.undone || a.status==='undone' || !(a.effectCheckedAt||a.effectCheckStatus==='checked') || !a.after || !a.start) return;
    const type=a.type||forecastMoveType(a.move);
    const category=a.category||type;
    const moveId=a.moveId||forecastMoveIdFromText(a.move)||moveNorm(a.move);
    const context=a.context?moveId+'|'+a.context:null;
    const put=(bucket,key,label)=>{if(!bucket[key]) bucket[key]=makeEmptyMoveEffectProfile(key,label); addActionToMoveEffectProfile(bucket[key],a);};
    put(profiles.byMove,moveId,a.move||moveId);
    put(profiles.byType,type,type);
    put(profiles.byCategory,category,category);
    if(context) put(profiles.byContext,context,a.context);
  });
  ['byMove','byType','byCategory','byContext'].forEach(k=>{
    Object.keys(profiles[k]).forEach(id=>{profiles[k][id]=finalizeMoveEffectProfile(profiles[k][id]);});
  });
  return profiles;
}
function profileLiftBonus(profile){
  if(!profile || profile.expectedLift===null || profile.expectedLift===undefined) return 0;
  const lift=Number(profile.expectedLift)||0;
  const proof=profile.proofLevel||'';
  const proofMult=proof==='Proven'?1.15:proof==='Strong signal'?1:proof==='Early signal'?.75:.45;
  return Math.max(-2.5,Math.min(3.2,lift*.65*proofMult + Math.min(.8,(profile.totalWeight||0)*.06)));
}
function profileConditionMatchBonus(profile,conditionKeys){
  if(!profile || !conditionKeys?.length) return {bonus:0,bestMatch:null,weakMatch:null};
  let bonus=0,bestMatch=null,weakMatch=null;
  conditionKeys.forEach(k=>{
    const c=profile.conditions?.[k];
    if(!c || c.expectedLift===null || c.count<2) return;
    const lift=Number(c.expectedLift)||0;
    const part=Math.max(-1.2,Math.min(1.4,lift*.35));
    bonus+=part;
    const row={key:k,count:c.count,expectedLift:c.expectedLift,bonus:Math.round(part*10)/10};
    if(part>0 && (!bestMatch || part>bestMatch.bonus)) bestMatch=row;
    if(part<0 && (!weakMatch || part<weakMatch.bonus)) weakMatch=row;
  });
  return {bonus:Math.round(bonus*10)/10,bestMatch,weakMatch};
}

function forecastMoveStats(){
  const actions=allForecastActions();
  const grouped={byType:{},byMove:{},byCategory:{},byContext:{}};
  actions.forEach(a=>{
    if(!a.done || a.undone || a.status==='undone' || !(a.effectCheckedAt||a.effectCheckStatus==='checked') || !a.after || !a.start) return;
    const type=a.type||forecastMoveType(a.move);
    const category=a.category||type;
    const moveId=a.moveId||forecastMoveIdFromText(a.move)||moveNorm(a.move);
    const imp=a.effectiveness?.averageImprovement ?? forecastActionImprovement(a);
    if(imp===null) return;
    const evidence=a.effectEvidence||effectEvidenceForAction(a);
    const w=Number(a.effectEvidenceWeight ?? evidence.weight ?? .5)||.5;
    const put=(bucket,key)=>{
      if(!bucket[key]) bucket[key]={key,count:0,avg:0,weightedAvg:0,totalWeight:0,weightedSum:0,improvements:[],evidence:{strong:0,medium:0,light:0,weak:0}};
      bucket[key].count++;
      bucket[key].improvements.push(imp);
      bucket[key].weightedSum+=imp*w;
      bucket[key].totalWeight+=w;
      const lab=evidence.label||'light';
      bucket[key].evidence[lab]=(bucket[key].evidence[lab]||0)+1;
    };
    put(grouped.byType,type);
    put(grouped.byCategory,category);
    put(grouped.byMove,moveId);
    if(a.context) put(grouped.byContext,moveId+'|'+a.context);
  });
  ['byType','byMove','byCategory','byContext'].forEach(bucketName=>{
    Object.values(grouped[bucketName]).forEach(g=>{
      g.avg=Math.round((g.improvements.reduce((a,b)=>a+b,0)/g.improvements.length)*10)/10;
      g.weightedAvg=g.totalWeight?Math.round((g.weightedSum/g.totalWeight)*10)/10:g.avg;
      g.avg=g.weightedAvg;
      g.totalWeight=Math.round(g.totalWeight*100)/100;
      g.proofLevel=proofLevelForStats(g.count,g.totalWeight);
      delete g.weightedSum;
      delete g.improvements;
    });
  });
  grouped.profiles=buildMoveEffectProfiles(actions);
  return grouped;
}
function moveHistoryScore(candidate, stats, contextKey, fc=null){
  let bonus=0, personal=false, stat=null, proofProfile=null, bestCondition=null, weakCondition=null;
  const moveStat=stats.byMove[candidate.id];
  const typeStat=stats.byType[candidate.type];
  const categoryStat=stats.byCategory?.[candidate.category];
  const ctxStat=stats.byContext[candidate.id+'|'+contextKey];

  if(categoryStat && categoryStat.count>=3){bonus+=Math.max(-1.5,Math.min(2.5,categoryStat.avg*.35)) + Math.min(.8,categoryStat.count*.06); personal=true; stat=categoryStat;}
  if(typeStat && typeStat.count>=2){bonus+=Math.max(-2,Math.min(3,typeStat.avg*.45)) + Math.min(1,typeStat.count*.08); personal=true; stat=typeStat;}
  if(moveStat && moveStat.count>=2){bonus+=Math.max(-3,Math.min(4,moveStat.avg*.75)) + Math.min(1.5,moveStat.count*.12); personal=true; stat=moveStat;}
  if(ctxStat && ctxStat.count>=1){bonus+=Math.max(-2.5,Math.min(3.5,ctxStat.avg*.9)) + .6; personal=true; stat=ctxStat;}

  const profiles=stats.profiles||{};
  const conditionKeys=fc?moveConditionKeysFromContext(fc,candidate):[];
  const profileCandidates=[
    profiles.byCategory?.[candidate.category],
    profiles.byType?.[candidate.type],
    profiles.byMove?.[candidate.id],
    profiles.byContext?.[candidate.id+'|'+contextKey]
  ].filter(Boolean);

  profileCandidates.forEach(p=>{
    const lift=profileLiftBonus(p);
    const match=profileConditionMatchBonus(p,conditionKeys);
    bonus+=lift+match.bonus;
    if(p.count>=1){personal=true; proofProfile=p; stat=p;}
    if(match.bestMatch && (!bestCondition || match.bestMatch.bonus>bestCondition.bonus)) bestCondition=match.bestMatch;
    if(match.weakMatch && (!weakCondition || match.weakMatch.bonus<weakCondition.bonus)) weakCondition=match.weakMatch;
  });

  return {bonus:Math.round(bonus*10)/10,personal,stat,proofProfile,bestCondition,weakCondition};
}
function privateBestMoveFromContext(c){
  const pv=c?.privateVariables||null;

  };

  }

    return {...base,id:'private_followup_missed',text:'Private event saved. Keep the data honest and move forward.',effort:'tiny',target:'honest data'};
  }

  return null;
}

    else if(moneyDue){moneyScore+=usableFocus?1.2:.6; moneyEvidence.push('weekly money check due');}

    if(missingMoveWhileOverdue){moneyScore+=.9; moneyEvidence.push('next money move missing');}

    if(period==='evening' && (moneyDue||moneyOverdue) && !ctx?.lowState){moneyScore+=.3; moneyEvidence.push('quick evening money check available');}

    let fatherScore=0, fatherEvidence=[];
    if(!ctx?.actions?.fatherhood){fatherScore+=2.2; fatherEvidence.push('fatherhood connection not logged');}
    if(ctx?.nightCtx?.stressParenting){fatherScore+=1.2; fatherEvidence.push('parenting stress active');}
    if(ctx?.irritability>=7 && !ctx?.fatherDaily?.repair){fatherScore+=.9; fatherEvidence.push('irritability makes repair high leverage');}
    if(fatherScore>0) rows.push(wave2BottleneckRow('fatherhood_drift','Fatherhood Drift',fatherScore,fatherEvidence,'warm connection or repair','connection_need'));

    let presenceScore=0, presenceEvidence=[];

    if(!ctx?.actions?.social){presenceScore+=.8; presenceEvidence.push('social connection not logged');}

    if(presenceScore>0) rows.push(wave2BottleneckRow('presence_social_drift','Presence / Social Drift',presenceScore,presenceEvidence,'clean / visible / warm social rep','presence_identity'));

    let emotionalScore=0, emotionalEvidence=[];
    if(ctx?.stressLogged && ctx?.stress>=7){emotionalScore+=1.6; emotionalEvidence.push('stress high');}
    if(ctx?.overwhelmLogged && ctx?.overwhelm>=7){emotionalScore+=1.8; emotionalEvidence.push('overwhelm high');}
    if(ctx?.currentEffectsLogged && ctx?.irritability>=7){emotionalScore+=1.4; emotionalEvidence.push('irritability high');}
    if(ctx?.moodLogged && ctx?.mood<=3){emotionalScore+=1.6; emotionalEvidence.push('mood low');}
    if(ctx?.nightStress || ctx?.nightCtx?.racingThoughts){emotionalScore+=.9; emotionalEvidence.push('night stress/racing thoughts');}
    if(emotionalScore>0) rows.push(wave2BottleneckRow('emotional_load','Emotional Load',emotionalScore,emotionalEvidence,'reduce stimulation + regain control','nervous_system'));
  }catch(e){}
  return rows;
}
function buildWave2BottleneckRankings(ctx={},base=null){
  try{
    base=base||detectPeakBottlenecks(ctx);
    const baseList=(base?.list||[]).map(r=>({...r,baseKey:r.key,lever:r.lever||r.bestLever||peakBottleneckDefaultLever(r.key)}));
    const specific=wave2AddSpecificBottlenecks(ctx,base);
    const confidence=ctx.currentStateLogged?(ctx.loggedDays>=14?'Medium':'Low'):'Very little confidence';
    const combined=[];
    const put=(r)=>{
      if(!r) return;
      const row={...r,label:r.label||peakBottleneckName(r.key),lever:r.lever||r.bestLever||peakBottleneckDefaultLever(r.key),score:Math.round((Number(r.score)||0)*10)/10,confidence:r.confidence||confidence};
      row.urgency=row.urgency || (row.score>=6?'High':row.score>=3.5?'Medium':row.score>0?'Low':'None');
      const idx=combined.findIndex(x=>x.key===row.key);
      if(idx>=0){ if(row.score>combined[idx].score) combined[idx]=row; }
      else combined.push(row);
    };
    baseList.forEach(put); specific.forEach(put);
    const active=combined.filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
    let primary=active[0] || base?.primary || combined.find(x=>x.key==='data_confidence') || null;
    let secondary=active.find(x=>x.key!==primary?.key) || base?.secondary || null;
    const mode=primary?.key==='data_confidence'?'Clarify':primary?.score>=6?'Protect':primary?.score>=3.5?'Stabilize':'Build';
    const ranked=combined.sort((a,b)=>b.score-a.score);
    return {...base,primary,secondary,list:ranked,ranked,mode,bestLever:primary?.lever||base?.bestLever||'next small move',summary:primary?`${primary.label}: ${primary.lever}`:(base?.summary||'No bottleneck detected'),wave2:true,ignoredForNow:ranked.filter(x=>x.score>0 && x.key!==primary?.key && x.key!==secondary?.key).slice(0,6),generatedAt:new Date().toISOString()};
  }catch(e){
    return base || {primary:{key:'data_confidence',label:'Data Confidence',score:0,evidence:['Wave 2 bottleneck ranking error'],lever:'log current state',urgency:'Low',confidence:'Very little confidence'},secondary:null,list:[],mode:'Clarify',bestLever:'log current state',error:String(e&&e.message||e)};
  }
}

function peakMoveMatchesBottleneck(cand,bottleneckKey){

  const type=String(cand?.type||'').toLowerCase();
  const cat=String(cand?.category||'').toLowerCase();
  const has=x=>tags.has(x)||type.includes(x)||cat.includes(x);
  const map={
    body_battery:()=>has('body')||has('movement')||has('workout')||has('strength')||has('walk')||has('water')||has('protein')||has('food')||has('light'),
    nervous_system:()=>has('breathing')||has('reset')||cat.includes('nervous')||type.includes('mind')||type.includes('breath'),
    mission_drift:()=>has('azure')||has('money')||type.includes('focus')||cat.includes('career')||cat.includes('money'),
    recovery_risk:()=>!!cand?.sleepRelated||has('sleep')||has('caffeine')||type.includes('night')||type.includes('protect'),
    environment_friction:()=>has('home')||has('automation')||cat.includes('environment')||type.includes('home'),
    connection_need:()=>has('adaya')||has('fatherhood')||has('social')||cat.includes('father')||type.includes('connection'),
    presence_identity:()=>has('confidence')||has('groom')||has('social')||has('workout')||has('strength')||type.includes('confidence'),
    faith_meaning:()=>has('faith')||has('zion')||has('prayer')||cat.includes('faith'),
    data_confidence:()=>type.includes('state_check')||has('log'),
    azure_drift:()=>has('azure')||cat.includes('career')||type.includes('azure')||type.includes('proof')||has('cloud')||has('screenshot')||has('lab'),
    money_drift:()=>has('money')||cat.includes('money')||type.includes('money')||has('budget')||has('spending')||has('bill'),
    fatherhood_drift:()=>has('adaya')||has('fatherhood')||cat.includes('father')||type.includes('connection')||type.includes('repair'),
    presence_social_drift:()=>has('confidence')||has('groom')||has('social')||has('visible')||has('outfit')||type.includes('confidence')||type.includes('social'),
    emotional_load:()=>has('breathing')||has('reset')||cat.includes('nervous')||type.includes('mind')||type.includes('breath')||has('no_scroll')||has('calm')
  };
  try{return !!(map[bottleneckKey]&&map[bottleneckKey]());}catch(e){return false;}
}


function eliteMoveFacetFlags(cand){
  const tags=new Set((cand?.tags||[]).map(x=>String(x).toLowerCase()));
  const type=String(cand?.type||'').toLowerCase();
  const cat=String(cand?.category||'').toLowerCase();
  const effort=String(cand?.effort||'low').toLowerCase();
  const has=(x)=>tags.has(x)||type.includes(x)||cat.includes(x);
  return {
    tags,type,cat,effort,has,

    low:['tiny','very low','low'].includes(effort),
    medium:effort==='medium',
    high:effort==='high',

    nervous:has('breathing')||has('reset')||cat.includes('nervous')||type.includes('mind')||type.includes('breath'),
    environment:has('home')||has('automation')||cat.includes('environment')||type.includes('home'),

    presence:has('confidence')||has('groom')||has('visible')||has('posture')||type.includes('confidence')
  };

function fitGradeLabel(score){
  score=Number(score)||0;
  if(score>=8) return 'Excellent fit';
  if(score>=5.5) return 'Strong fit';
  if(score>=3) return 'Good fit';
  if(score>=1) return 'Usable fit';
  if(score>=-1) return 'Neutral fit';
  return 'Poor fit';

  const total=Math.round(totalRaw*10)/10;

function elitePeakMoveFitScore(cand,fc){
  try{
    const tags=new Set((cand.tags||[]).map(x=>String(x).toLowerCase()));
    const type=String(cand.type||'').toLowerCase();
    const cat=String(cand.category||'').toLowerCase();
    const effort=String(cand.effort||'low').toLowerCase();
    const tw=fc.timeWindow?.key||'';
    const workday=!['Saturday','Sunday'].includes(weekdayForDateKey(fc.date||todayKey()));
    let s=0;

    const has=(x)=>tags.has(x)||type.includes(x)||cat.includes(x);
    const body=has('body')||has('movement')||has('workout')||has('strength')||has('walk')||has('water')||has('protein')||has('light');
    const mission=has('azure')||has('money')||type.includes('deep_focus')||cat.includes('career')||cat.includes('money');
    const father=has('adaya')||has('fatherhood')||cat.includes('father');
    const sleep=!!cand.sleepRelated||has('sleep')||type.includes('night')||type.includes('caffeine_guard');
    const nervous=has('breathing')||cat.includes('nervous')||type.includes('reset');
    const environment=has('home')||has('automation')||cat.includes('environment');

    // Current-state fit: never punish with a high-friction move when the floor is low.
    if(fc.veryLowState){
      if(['tiny','very low','low'].includes(effort)) s+=1.4;
      if(body) s+=1.1;
      if(nervous) s+=1.1;
      if(father && fc.periodKey==='evening') s+=.7;
      if(effort==='medium') s-=1.2;
      if(effort==='high') s-=3.2;
      if(mission && !type.includes('state_check')) s-=.9;
    }else if(fc.lowState){
      if(['tiny','very low','low'].includes(effort)) s+=.9;
      if(body) s+=.9;
      if(nervous) s+=.7;
      if(effort==='high') s-=2;
    }else if(fc.goodState){
      if(mission) s+=1.2;
      if(has('workout')||has('strength')||type.includes('planned_strength')) s+=1.5;
      if(effort==='tiny' && (mission||has('workout'))) s-=.4;
    }

    // Goal-gap pressure from current patterns.
    if(fc.noWater && (has('water')||has('hydration'))) s+=1.2;
    if(!fc.actions?.workout && (has('movement')||has('workout')||has('strength')||has('walk'))) s+=1.3;
    if(!fc.actions?.azure && has('azure') && !fc.lowState) s+=.9;
    if(!fc.actions?.money && has('money') && !fc.lowState) s+=.6;
    if(!fc.actions?.fatherhood && father) s+=1.1;
    if(!fc.d?.home && environment) s+=.8;
    if(fc.lateCaffeine && (sleep||has('caffeine'))) s+=1.2;
    if(!fc.actions?.nightReset && sleep && fc.periodKey==='evening') s+=1.2;

    // Time-block fit.
    if(fc.periodKey==='morning'){
      if(has('light')||has('circadian')||has('water')||has('protein')) s+=.9;
      if(workday && mission && fc.focus>=5 && fc.drive>=5) s+=.6;
    }
    if(fc.periodKey==='afternoon'){
      if(has('movement')||has('walk')||has('food')||has('water')||type.includes('focus')) s+=.8;
      if(tw==='mid_afternoon'||tw==='late_afternoon') s+= has('movement')||has('walk')||has('protein') ? .8 : 0;
    }
    if(fc.periodKey==='evening'){
      if(sleep) s+=1.1;
      if(father) s+=.8;
      if(environment && !fc.veryLowState) s+=.5;
      if(mission && fc.lowState) s-=1.2;
      if(effort==='high') s-=2.3;
    }

    // Lifestyle constraints.
    if(fc.isSaturday && fc.actions?.saturdayKeepLight){
      if(effort==='high') s-=2.8;
      if(effort==='medium') s-=1;
      if(father||sleep||nervous) s+=.5;
    }

    // Bottleneck-first fit: Phase 2 makes the main limiter matter before simple category scoring.
    const pb=fc.peakBottlenecks?.primary?.key;
    const sb=fc.peakBottlenecks?.secondary?.key;
    if(pb && peakMoveMatchesBottleneck(cand,pb)) s+=1.7;
    if(sb && peakMoveMatchesBottleneck(cand,sb)) s+=.6;
    if(pb && !peakMoveMatchesBottleneck(cand,pb) && fc.peakBottlenecks?.primary?.score>=6) s-=.8;

    // Protect against fake "peak": the best move must be doable.
    if(effort==='high' && !fc.goodState) s-=2.5;
    if(effort==='medium' && fc.veryLowState) s-=1.5;
    if(cand.source==='fallback') s-=.2;

    return Math.round(s*10)/10;
  }catch(e){return 0;}
}

function hoursSinceIso(iso){

function forecastEffectDelayMinutes(a){
  const cat=String(a?.category||'').toLowerCase();
  const type=String(a?.type||'').toLowerCase();
  if(a?.sleepRelated || cat.includes('sleep') || type.includes('sleep') || type==='night_reset' || type==='close_day') return null; // next morning
  if(cat.includes('nervous') || type==='mind_reset' || type==='journal_reset') return 20;
  if(type==='food_stabilize' || cat.includes('food') || cat==='body') return 60;
  if(type==='walk_sunlight' || type==='body_care' || type==='confidence_care') return 45;

function forecastEffectDueAt(a){
  const completed=a?.completedAt||new Date().toISOString();
  const dt=new Date(completed);
  if(Number.isNaN(dt.getTime())) return new Date(Date.now()+45*60000).toISOString();
  const delay=forecastEffectDelayMinutes(a);
  if(delay===null){
    const due=new Date(dt.getTime());
    due.setDate(due.getDate()+1);
    due.setHours(8,0,0,0);
    return due.toISOString();
  }
  return new Date(dt.getTime()+delay*60000).toISOString();
}
function forecastEffectCheckStatus(a){
  if(!a) return 'none';
  if(a.undone || a.status==='undone') return 'undone';
  if(!a.done && a.status!=='done') return 'not_done';
  if(a.effectCheckedAt || a.effectCheckStatus==='checked') return 'checked';
  const dueIso=a.effectCheckDueAt||forecastEffectDueAt(a);
  const due=new Date(dueIso).getTime();
  if(!due || Number.isNaN(due)) return 'pending';
  if(Date.now()<due) return 'pending';
  const ageHours=(Date.now()-due)/36e5;
  return ageHours>18?'delayed':'ready';
}

  const due=new Date(dueIso);
  if(Number.isNaN(due.getTime())) return '';
  return localDateTimeLabel(due).replace(/^.*?,\s*/,'');
}
function nextPeriodAfter(period){

function forecastEffectTarget(a){

function effectCheckLagMinutes(a){
  const done=new Date(a?.completedAt||a?.persistedDoneAt||a?.recommendedAt||0).getTime();
  const checked=new Date(a?.effectCheckedAt||Date.now()).getTime();
  if(!done || Number.isNaN(done) || !checked || Number.isNaN(checked)) return null;

function effectCheckWindowLabel(a){
  const lag=effectCheckLagMinutes(a);
  const target=forecastEffectTarget(a);
  if(lag===null) return target.label;
  if(target.kind==='next_morning') return 'next morning';
  const delay=forecastEffectDelayMinutes(a)||45;

function effectEvidenceForAction(a){
  const lag=Number(a?.effectCheckLagMinutes ?? effectCheckLagMinutes(a));
  const method=String(a?.effectCheckMethod||'');
  const samePeriod=!!(a?.effectCheckPeriod && a?.period && a.effectCheckPeriod===a.period);
  const delay=forecastEffectDelayMinutes(a);
  const isSleep=isSleepForecastAction(a) || delay===null;
  let weight=.35, label='light', basis='delayed';

  if(isSleep){
    basis='next_morning';
    // Sleep/recovery moves should be judged by next morning, not immediate mood.
    if(a?.effectCheckPeriod==='morning' && lag>=240 && lag<=1080){weight=1.05; label='strong';}
    else if(lag<=1440){weight=.75; label='medium';}
    else {weight=.35; label='light';}
  }else if(method==='auto_delayed_same_block' || samePeriod){
    basis='same_block';
    const d=delay||45;
    if(lag<=d+90){weight=1; label='strong';}
    else if(lag<=300){weight=.75; label='medium';}
    else if(lag<=540){weight=.45; label='light';}
    else {weight=.25; label='weak';}
  }else if(method==='auto_next_block' || a?.effectCheckPeriod){
    basis='next_block';
    if(lag<=420){weight=.8; label='medium';}
    else if(lag<=780){weight=.5; label='light';}
    else {weight=.3; label='weak';}
  }else if(method==='manual'){
    basis='manual';
    if(lag<=180){weight=.65; label='medium';}
    else if(lag<=480){weight=.4; label='light';}
    else {weight=.25; label='weak';}
  }

  return {
    weight:Math.round(weight*100)/100,
    label,
    basis,
    lagMinutes:Number.isFinite(lag)?lag:null,

}

function findEffectCheckCandidateForAuto(periodKey){

function wave3ProofContextTagsFromAction(a){

  try{
    const period=a?.period||a?.start?.period||'unknown';
    if(period) tags.push('period:'+period);
    if(a?.moveDomain) tags.push('domain:'+String(a.moveDomain).toLowerCase().replace(/[^a-z0-9]+/g,'_'));
    if(a?.moveMode) tags.push('mode:'+String(a.moveMode).toLowerCase());
    if(a?.start){
      if(typeof a.start.energy==='number') tags.push(a.start.energy<=3?'low_energy':a.start.energy>=7?'high_energy':'steady_energy');
      if(typeof a.start.focus==='number') tags.push(a.start.focus<=3?'low_focus':a.start.focus>=7?'high_focus':'steady_focus');
      if(typeof a.start.drive==='number') tags.push(a.start.drive<=3?'low_drive':a.start.drive>=7?'high_drive':'steady_drive');
    }
    if(isSleepForecastAction(a)) tags.push('recovery_move');
    const bk=a?.forecast?.primaryBottleneck?.key || a?.contextSnapshot?.peakBottlenecks?.primary?.key || '';
    if(bk) tags.push('bottleneck:'+bk);
  }catch(e){}
  return [...new Set(tags.filter(Boolean))];
}
function wave3ProofContextTagsFromContext(fc,cand={}){
  const tags=[];
  try{
    const p=fc?.periodKey||currentGuidePeriod().key;
    if(p) tags.push('period:'+p);
    const domain=peakMoveDomain(cand,fc||{});
    if(domain) tags.push('domain:'+String(domain).toLowerCase().replace(/[^a-z0-9]+/g,'_'));
    const mode=peakMoveMode(cand,fc||{},fc?.level||'Yellow');
    if(mode) tags.push('mode:'+String(mode).toLowerCase());
    if(fc?.veryLowState || fc?.energy<=3) tags.push('low_energy');
    else if(fc?.goodState || fc?.energy>=7) tags.push('high_energy');
    else tags.push('steady_energy');
    if(fc?.focus<=3) tags.push('low_focus'); else if(fc?.focus>=7) tags.push('high_focus');
    if(fc?.drive<=3) tags.push('low_drive'); else if(fc?.drive>=7) tags.push('high_drive');
    if(cand?.sleepRelated) tags.push('recovery_move');
    if(fc?.peakBottlenecks?.primary?.key) tags.push('bottleneck:'+fc.peakBottlenecks.primary.key);
  }catch(e){}
  return [...new Set(tags.filter(Boolean))];
}
function wave3PendingProofPromptCandidate(){
  try{
    const rows=[];
    const now=Date.now();
    Object.entries(state.days||{}).forEach(([date,d])=>{
      if(!d || !Array.isArray(d.forecastActions)) return;
      (d.forecastActions||[]).forEach(a=>{
        if(!a || a.undone || forecastActionLifecycle(a)!=='done') return;
        if(wave3ActionProofStatus(a) || a.effectCheckedAt || a.effectCheckStatus==='checked') return;
        if(a.effectCheck?.dismissedAt || a.wave3ProofSkippedAt) return;
        if(['state_check','terminal_end_day'].includes(String(a.type||''))) return;
        const dueIso=a.effectCheckDueAt||forecastEffectDueAt(a);
        const due=new Date(dueIso).getTime();
        if(due && !Number.isNaN(due) && now<due) return;
        const ageH=hoursSinceIso(a.completedAt||a.persistedDoneAt||a.recommendedAt);
        if(ageH>36 && !isSleepForecastAction(a)) return;
        if(ageH>60) return;
        rows.push({date,action:a,due:due||0,ageH});
      });
    });
    rows.sort((a,b)=>(b.due||0)-(a.due||0));
    return rows[0]||null;
  }catch(e){return null;}
}
function renderWave3ProofPrompt(){
  const row=wave3PendingProofPromptCandidate();
  if(!row) return '';
  const a=row.action;
  const id=JSON.stringify(a.id||'');
  const date=JSON.stringify(row.date||todayKey());
  const move=String(a.move||'this move');
  return `<div class="wave3ProofPrompt" onclick="event.stopPropagation()"><div class="tiny"><b>Did this help?</b></div><div class="wave3ProofMove">${esc(move)}</div><div class="chips"><button class="btn small logged" onclick='recordWave3ProofOutcome(${id},${date},"helped")'>Helped</button><button class="btn small" onclick='recordWave3ProofOutcome(${id},${date},"unsure")'>Not sure</button><button class="btn small" onclick='recordWave3ProofOutcome(${id},${date},"did_not_help")'>Did not help</button></div></div>`;
}
function recordWave3ProofOutcome(actionId,dateKey,status){
  if(!['helped','unsure','did_not_help'].includes(status)) return;
  const d=state.days?.[dateKey]||day();
  if(!d || !Array.isArray(d.forecastActions)) return;
  const a=d.forecastActions.find(x=>x && x.id===actionId);
  if(!a || a.undone) return;
  const pf=peakForecast(day());
  const after=forecastActionSnapshot(day(),pf);
  const now=new Date().toISOString();
  a.after=after;
  a.afterContextSnapshot=forecastContextSnapshot(pf.context||buildForecastContext(day(),{periodKey:pf.timePeriod}));
  a.effectCheck={
    status,
    checkedAt:now,
    checkWindow:effectCheckWindowLabel(a),
    energyBefore:a.start?.energy ?? null,
    energyAfter:after?.energy ?? null,
    moodBefore:a.start?.mood ?? null,
    moodAfter:after?.mood ?? null,
    focusBefore:a.start?.focus ?? null,
    focusAfter:after?.focus ?? null,
    driveBefore:a.start?.drive ?? null,
    driveAfter:after?.drive ?? null,
    contextTags:wave3ProofContextTagsFromAction(a),
    note:'',
    source:'wave3_tiny_prompt'
  };
  a.effectCheckedAt=now;
  a.effectCheckStatus='checked';
  a.effectCheckMethod='manual_subjective';
  a.effectCheckPeriod=currentGuidePeriod().key;
  a.effectCheckWindow=effectCheckWindowLabel(a);
  a.effectCheckLagMinutes=effectCheckLagMinutes(a);
  a.effectEvidence=effectEvidenceForAction(a);
  a.effectEvidenceWeight=a.effectEvidence.weight;
  a.improvement=forecastActionImprovement(a);
  a.effectiveness=forecastMoveEffectiveness(a);
  save();
  render();
}

var WAVE3B_PROFILE_CACHE=null;
function wave3BNumber(v){if(v===null||v===undefined||v==='') return null; const n=Number(v); return Number.isFinite(n)?n:null;}
function wave3BMetricKeys(){return ['score','energy','mood','focus','drive','stress','overwhelm','irritability'];}
function wave3BPeriodMetricValue(d,period,metric){
  d=d?migrateDay(d):null;
  if(!d) return null;
  const map={
    energy:'energy', mood:'mood', stress:'therapyStress', overwhelm:'therapyOverwhelm', confidence:'therapyConfidence',
    irritability:'pattern.irritability', focus:'pattern.focusLevel', drive:'pattern.driveLevel'
  };
  const rangeKey=map[metric]||metric;
  const row=d._rangePeriods?.[rangeKey]?.[period];
  const n=wave3BNumber(row?.value);
  if(n!==null) return n;
  if(metric==='energy') return wave3BNumber(d.energy);
  if(metric==='mood') return wave3BNumber(d.mood);
  if(metric==='stress') return wave3BNumber(d.therapy?.stress);
  if(metric==='overwhelm') return wave3BNumber(d.therapy?.overwhelm);
  if(metric==='irritability') return wave3BNumber(d.pattern?.irritability);
  if(metric==='focus') return wave3BNumber(d.pattern?.focusLevel);
  if(metric==='drive') return wave3BNumber(d.pattern?.driveLevel);
  return null;
}
function wave3BScoreFromMetrics(snap={}){
  const pos=['energy','mood','focus','drive'].map(k=>wave3BNumber(snap[k])).filter(n=>n!==null);
  const neg=['stress','overwhelm','irritability'].map(k=>wave3BNumber(snap[k])).filter(n=>n!==null).map(n=>11-n);
  const nums=[...pos,...neg];
  return nums.length?Math.round((nums.reduce((a,b)=>a+b,0)/nums.length)*10)/10:null;
}
function wave3BSnapshotFor(dateKey,period){
  const d=state.days?.[dateKey];
  if(!d) return null;
  const snap={date:dateKey,period:period||'',source:'period_or_day'};
  ['energy','mood','focus','drive','stress','overwhelm','irritability'].forEach(k=>{snap[k]=wave3BPeriodMetricValue(d,period,k);});
  snap.score=wave3BScoreFromMetrics(snap);
  snap.loggedMetrics=['energy','mood','focus','drive','stress','overwhelm','irritability'].filter(k=>snap[k]!==null).length;
  return snap.loggedMetrics?snap:null;
}
function wave3BSnapshotFromActionStart(a){

  const snap={date:a.date||todayKey(),period:a.period||'',source:'action_start'};
  ['score','energy','mood','focus','drive','stress','overwhelm','irritability'].forEach(k=>{snap[k]=wave3BNumber(a.start[k]);});
  if(snap.score===null) snap.score=wave3BScoreFromMetrics(snap);
  snap.loggedMetrics=['energy','mood','focus','drive','stress','overwhelm','irritability'].filter(k=>snap[k]!==null).length;
  return snap.loggedMetrics?snap:null;
}
function wave3BSnapshotFromActionAfter(a){

  ['score','energy','mood','focus','drive','stress','overwhelm','irritability'].forEach(k=>{snap[k]=wave3BNumber(a.after[k]);});

function wave3BTargetWindowForAction(a){
  const period=a?.period||'afternoon';
  if(isSleepForecastAction(a) || forecastEffectDelayMinutes(a)===null) return {date:offsetDateKey(a?.date||todayKey(),1),period:'morning',window:'next_morning'};
  const np=nextPeriodAfter(period);
  if(period==='evening') return {date:offsetDateKey(a?.date||todayKey(),1),period:'morning',window:'next_day'};
  return {date:a?.date||todayKey(),period:np,window:'next_block'};
}
function wave3BFindAfterSnapshot(a){
  return wave3BSnapshotFromActionAfter(a) || (()=>{const t=wave3BTargetWindowForAction(a); return wave3BSnapshotFor(t.date,t.period);})();
}
function wave3BObservedDelta(before,after){
  if(!before || !after) return {delta:null,metrics:{},count:0};
  const vals=[]; const metrics={};
  ['score','energy','mood','focus','drive'].forEach(k=>{
    const b=wave3BNumber(before[k]), c=wave3BNumber(after[k]);
    if(b!==null && c!==null){metrics[k]=Math.round((c-b)*10)/10; vals.push(metrics[k]);}
  });
  ['stress','overwhelm','irritability'].forEach(k=>{
    const b=wave3BNumber(before[k]), c=wave3BNumber(after[k]);
    if(b!==null && c!==null){metrics[k]=Math.round((b-c)*10)/10; vals.push(metrics[k]);}
  });
  const delta=vals.length?Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10:null;
  return {delta,metrics,count:vals.length};
}
function wave3BDateBefore(a,b){return String(a||'')<String(b||'');}
function wave3BBaselineForAction(a){
  try{
    const date=a?.date||todayKey();
    const period=a?.period||'afternoon';
    const target=wave3BTargetWindowForAction(a);
    const rows=[];
    Object.keys(state.days||{}).sort().forEach(k=>{
      if(!wave3BDateBefore(k,date)) return;
      const before=wave3BSnapshotFor(k,period);
      const afterDate=target.window==='next_block'?k:offsetDateKey(k,1);
      const after=wave3BSnapshotFor(afterDate,target.period);
      const d=wave3BObservedDelta(before,after);
      if(d.delta!==null && d.count>=2) rows.push({date:k,delta:d.delta});
    });
    const recent=rows.slice(-12);
    const sample=recent.length;
    const avg=sample?Math.round((recent.reduce((x,y)=>x+y.delta,0)/sample)*10)/10:0;
    return {type:sample>=2?'similar_period':'none',sampleSize:sample,expectedDelta:avg};
  }catch(e){return {type:'none',sampleSize:0,expectedDelta:0};}
}
function wave3BConfoundersForAction(a,before,after){
  const ctx=a?.contextSnapshot||{};
  const out=[];
  if(ctx.lowSleep || ctx.veryLowSleep) out.push('low sleep');
  if(ctx.recoveryRisk>=65 || ctx.highRecoveryRisk) out.push('high recovery risk');
  if(ctx.nightFoodRisk || ctx.foodRisk) out.push('food risk');
  if(ctx.activeLoadLogged || ctx.activeLoadAny) out.push('active load');
  if(ctx.isSaturday) out.push('Saturday pattern');
  if(ctx.phoneBoundaryOpen) out.push('phone boundary open');
  if(!before || !after) out.push('missing before/after state');
  return [...new Set(out)].slice(0,6);
}
function wave3BConfidenceForInference(observed,baseline,confounders,manualStatus){
  if(!observed || observed.delta===null || observed.count<2) return 'low';
  let points=0;
  if(observed.count>=4) points+=1;
  if(baseline?.sampleSize>=2) points+=1;
  if(baseline?.sampleSize>=5) points+=1;
  if(!confounders?.length) points+=1;
  if(manualStatus && manualStatus!=='unsure') points+=0.5;
  if(points>=3) return 'high';
  if(points>=1.5) return 'medium';
  return 'low';
}
function wave3BManualStatusForAction(a){
  const s=wave3ActionProofStatus(a);
  return ['helped','unsure','did_not_help'].includes(s)?s:null;
}
function wave3BInferActionOutcome(a){
  if(!a || a.undone || forecastActionLifecycle(a)==='undone') return {label:'not_enough_data',confidence:'low',score:0,reason:'action unavailable'};
  const before=wave3BSnapshotFromActionStart(a) || wave3BSnapshotFor(a.date||todayKey(),a.period||'afternoon');
  const after=wave3BFindAfterSnapshot(a);
  const observed=wave3BObservedDelta(before,after);
  const baseline=wave3BBaselineForAction(a);
  const manual=wave3BManualStatusForAction(a);
  if(observed.delta===null || observed.count<2){
    let manualScore=manual==='helped'?0.15:manual==='did_not_help'?-0.15:0;
    return {label:manual?'unclear':'not_enough_data',confidence:'low',score:manualScore,manualStatus:manual,before,after,observed,baseline,contextTags:wave3ProofContextTagsFromAction(a),reasons:[manual?'manual signal only':'not enough later data'],confounders:wave3BConfoundersForAction(a,before,after),source:'wave3B_live'};
  }
  const adjusted=Math.round((observed.delta-(Number(baseline.expectedDelta)||0))*10)/10;
  const confounders=wave3BConfoundersForAction(a,before,after);
  const confidence=wave3BConfidenceForInference(observed,baseline,confounders,manual);
  let score=adjusted;
  if(manual==='helped') score+=0.15;
  if(manual==='did_not_help') score-=0.15;
  score=Math.max(-2,Math.min(2,score));
  let label='unclear';
  const threshold=confidence==='high'?0.45:0.6;
  if(score>=threshold && confidence!=='low') label='likely_helped';
  else if(score<=-threshold && confidence!=='low') label='likely_did_not_help';
  const reasons=[];
  reasons.push(`observed ${observed.delta>0?'+':''}${observed.delta}`);
  if(baseline.sampleSize) reasons.push(`baseline ${baseline.expectedDelta>0?'+':''}${baseline.expectedDelta} (${baseline.sampleSize})`);
  if(manual) reasons.push(`manual: ${manual.replaceAll('_',' ')}`);
  return {label,confidence,score:Math.round(score*10)/10,manualStatus:manual,before,after,observed:{...observed,adjusted},baseline,contextTags:wave3ProofContextTagsFromAction(a),reasons,confounders,source:'wave3B_live'};
}
function wave3BLabelToProofStatus(label){
  if(label==='likely_helped') return 'helped';

  if(label==='unclear') return 'unsure';

function wave3BLabelText(label){

}
function wave3BInferenceFingerprint(actions){

function buildWave3BAutomaticOutcomeLearning(actions=null,opts={}){
  actions=actions||allForecastActions();
  const limit=Number(opts.limit||120);
  const recent=(actions||[]).filter(a=>a && forecastActionLifecycle(a)!=='undone').slice(-limit);
  const summary={version:'wave3B_live_outcome_inference',mode:'live_derived_not_saved',evaluatedMoves:0,likelyHelped:0,unclear:0,likelyDidNotHelp:0,notEnoughData:0,confidence:'not enough data yet',byMove:{},byType:{},byCategory:{},recent:[]};
  const put=(bucket,key,label,inf)=>{
    if(!key) return;
    if(!bucket[key]) bucket[key]={key,label:label||key,evaluated:0,likelyHelped:0,unclear:0,likelyDidNotHelp:0,notEnoughData:0,totalScore:0,confidence:'low',contextTags:{}};
    const p=bucket[key]; p.evaluated++;
    if(inf.label==='likely_helped') p.likelyHelped++;
    else if(inf.label==='likely_did_not_help') p.likelyDidNotHelp++;
    else if(inf.label==='unclear') p.unclear++;
    else p.notEnoughData++;
    p.totalScore+=Number(inf.score)||0;
    (inf.contextTags||[]).forEach(t=>{p.contextTags[t]=(p.contextTags[t]||0)+1;});
  };
  recent.forEach(a=>{
    const inf=wave3BInferActionOutcome(a);
    summary.evaluatedMoves++;
    if(inf.label==='likely_helped') summary.likelyHelped++;
    else if(inf.label==='likely_did_not_help') summary.likelyDidNotHelp++;
    else if(inf.label==='unclear') summary.unclear++;
    else summary.notEnoughData++;
    const moveKey=wave3MoveKeyForAction(a);
    put(summary.byMove,moveKey,a.move||moveKey,inf);
    put(summary.byType,a.type||forecastMoveType(a.move),a.type||forecastMoveType(a.move),inf);
    put(summary.byCategory,a.category||a.type||forecastMoveType(a.move),a.category||a.type||forecastMoveType(a.move),inf);
    if(summary.recent.length<40) summary.recent.push({date:a.date,move:a.move,moveId:a.moveId||forecastMoveIdFromText(a.move),type:a.type||forecastMoveType(a.move),label:inf.label,confidence:inf.confidence,score:inf.score,window:wave3BTargetWindowForAction(a).window,reasons:(inf.reasons||[]).slice(0,3),confounders:(inf.confounders||[]).slice(0,4)});
  });
  ['byMove','byType','byCategory'].forEach(bucket=>{
    Object.values(summary[bucket]).forEach(p=>{
      const usable=p.evaluated-p.notEnoughData;
      p.likelyHelpedRate=usable?Math.round((p.likelyHelped/usable)*100):null;
      p.avgScore=p.evaluated?Math.round((p.totalScore/p.evaluated)*10)/10:0;
      p.confidence=usable>=6?'high':usable>=3?'medium':usable>=1?'low':'not enough data';
      p.bestContexts=Object.entries(p.contextTags||{}).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([key,count])=>({key,count}));
      delete p.totalScore;
    });
  });
  const usable=summary.evaluatedMoves-summary.notEnoughData;
  summary.confidence=usable>=10?'medium':usable>=4?'low':'not enough data yet';
  summary.strongestSignals=Object.values(summary.byMove).filter(p=>p.likelyHelpedRate!==null).sort((a,b)=>(b.avgScore-a.avgScore)).slice(0,5).map(p=>({move:p.label,score:p.avgScore,rate:p.likelyHelpedRate,confidence:p.confidence}));
  summary.weakSignals=Object.values(summary.byMove).filter(p=>p.likelyHelpedRate!==null).sort((a,b)=>(a.avgScore-b.avgScore)).slice(0,5).map(p=>({move:p.label,score:p.avgScore,rate:p.likelyHelpedRate,confidence:p.confidence}));
  return summary;
}
function wave3BAutomaticOutcomeFitForCandidate(cand={},contextKey='',fc=null){
  const actions=allForecastActions();
  const learning=buildWave3BAutomaticOutcomeLearning(actions,{limit:90});
  const moveKey=wave3MoveKeyForCandidate(cand);
  const options=[learning.byMove?.[moveKey],learning.byType?.[cand.type],learning.byCategory?.[cand.category]].filter(Boolean);
  const contextTags=wave3ProofContextTagsFromContext(fc||{},cand);
  let bonus=0, profile=null, reasons=[];
  options.forEach(p=>{
    if(!p || !p.evaluated) return;
    const usable=p.evaluated-p.notEnoughData;
    if(usable<2) return;
    let part=0;
    if(p.confidence==='high' && p.avgScore>=0.55) part+=0.45;
    else if(p.confidence==='medium' && p.avgScore>=0.55) part+=0.28;
    else if(p.avgScore>=0.8) part+=0.12;
    if(p.confidence==='high' && p.avgScore<=-0.55) part-=0.4;
    else if(p.confidence==='medium' && p.avgScore<=-0.55) part-=0.25;
    const matchCount=contextTags.filter(t=>p.contextTags?.[t]).length;
    if(matchCount && p.avgScore>0.4 && usable>=3) part+=Math.min(.18,matchCount*.06);
    if(Math.abs(part)>Math.abs(bonus)) profile=p;
    bonus+=part;
    if(part) reasons.push(`${p.label}: ${wave3BLabelText(p.avgScore>=0?'likely_helped':'unclear')} (${usable})`);
  });
  bonus=Math.max(-.45,Math.min(.55,bonus));
  return {bonus:Math.round(bonus*10)/10,profile,reasons:reasons.slice(0,3),checked:learning.evaluatedMoves,confidence:learning.confidence,learning};
}

function buildWave3MoveEffectProfiles(actions=null){

    put(profiles.byMove,moveKey,a.move||moveKey,status,tags,inf);

  });
  ['byMove','byType','byCategory'].forEach(bucket=>{
    Object.values(profiles[bucket]).forEach(p=>{
      p.helpRate=p.checked?Math.round((p.helped/p.checked)*100):null;
      p.avgScore=p.checked?Math.round((p.totalScore/Math.max(1,p.checked))*10)/10:0;
      p.confidence=p.checked>=6?'Strong signal':p.checked>=3?'Early signal':p.checked>=1?'Collecting':'Not enough data';
      p.bestContexts=Object.entries(p.contextTags||{}).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([key,count])=>({key,count}));

function wave3ProofFitForCandidate(cand={},contextKey='',fc=null){
  const profiles=buildWave3MoveEffectProfiles();
  const moveKey=wave3MoveKeyForCandidate(cand);
  const options=[profiles.byMove?.[moveKey],profiles.byType?.[cand.type],profiles.byCategory?.[cand.category]].filter(Boolean);
  const contextTags=wave3ProofContextTagsFromContext(fc||{},cand);
  let bonus=0, profile=null, reasons=[];
  options.forEach(p=>{
    if(!p || !p.checked) return;
    let part=0;
    if(p.checked>=3){
      if(p.helpRate>=65) part+=p.confidence==='Strong signal'?0.45:0.25;
      if(p.helpRate<=25) part-=p.confidence==='Strong signal'?0.38:0.22;
    }else if(p.checked>=1 && p.helpRate>=80){
      part+=0.08;
    }
    const matchCount=contextTags.filter(t=>p.contextTags?.[t]).length;
    if(matchCount && p.helpRate>=65 && p.checked>=2) part+=Math.min(.16,matchCount*.05);
    if(Math.abs(part)>Math.abs(bonus)){profile=p;}
    bonus+=part;
    if(part) reasons.push(`${p.label}: ${p.helpRate}% likely helped (${p.checked})`);
  });

  const auto=wave3BAutomaticOutcomeFitForCandidate(cand,contextKey,fc);
  bonus+=auto.bonus||0;
  if(auto.profile && Math.abs(auto.bonus||0)>=Math.abs(bonus)) profile=auto.profile;
  reasons=reasons.concat(auto.reasons||[]);
  bonus=Math.max(-.55,Math.min(.65,bonus));
  return {bonus:Math.round(bonus*10)/10,profile,reasons:reasons.slice(0,3),checked:profiles.checkedCount,confidence:profiles.confidence,automaticOutcome: auto};
}
function forecastActionLifecycle(a){
  if(!a) return 'unknown';

  if(a.done || a.status==='done') return 'done';

function latestCompletedForecastActionForDisplay(f){
  const today=todayKey();
  const period=currentGuidePeriod().key;
  const lock=state.settings?.forecastDisplayLock;

  // Keep a completed move visible only inside the same time block.
  // When morning -> afternoon -> evening changes, the old move stays in history,
  // but the Peak card is allowed to pick a fresh move.
  if(lock && lock.lockDate===today && !lock.released && (lock.period||period)===period){
    const locked=findForecastActionById(lock.date, lock.id);
    if(locked && !locked.displayLockReleased && !locked.followupRequested && forecastActionLifecycle(locked)==='done') return locked;
  }

  const d=state.days?.[today];
  if(!d || !Array.isArray(d.forecastActions)) return null;
  const completed=d.forecastActions
    .filter(a=>a && forecastActionLifecycle(a)==='done' && !a.undone && !a.displayLockReleased && !a.followupRequested && (a.period||period)===period)
    .map(a=>({...a,date:today}))
    .sort((a,b)=>new Date(b.completedAt||b.recommendedAt||0)-new Date(a.completedAt||a.recommendedAt||0));
  return completed[0] || null;
}

function chooseAlternateForecastMove(current={},source='try_another'){
  const info=addForecastDismissalForPayload(current,source);

  const dismissedRows=d.forecastDismissals.filter(x=>x.period===period && x.status==='dismissed');
  const dismissedIds=new Set(dismissedRows.map(x=>x.moveId||forecastMoveIdFromText(x.move||'')));
  const dismissedText=new Set(dismissedRows.map(x=>moveNorm(x.move||'')));
  const dismissedFamilies=new Set(dismissedRows.map(x=>x.moveFamily||moveFamilyKey(x)).filter(Boolean));
  dismissedIds.add(moveId);
  dismissedText.add(moveTextNorm);
  dismissedFamilies.add(moveFamilyKey(current));

  const dismissedGroups=new Set(dismissedRows.map(x=>x.dedupeGroup||wave2MoveDedupeGroup(x)).filter(Boolean));
  dismissedGroups.add(wave2MoveDedupeGroup(current));
  let candidates=(f.moveCandidates||[])
    .filter(c=>c && c.id)
    .filter(c=>!dismissedIds.has(c.id) && !dismissedText.has(moveNorm(c.text||c.move||c.title||'')))
    .filter(c=>!dismissedGroups.has(wave2MoveDedupeGroup(c)))
    .filter(c=>!wave2IsNearDuplicateMove(c,current))
    .filter(c=>c.id!=='log_current_state' && c.type!=='state_check' && !/^\s*log current state/i.test(String(c.text||'')));

  const differentFamily=candidates.filter(c=>!dismissedFamilies.has(moveFamilyKey(c)) && !dismissedGroups.has(wave2MoveDedupeGroup(c)));

    state.settings=state.settings||{};
    state.settings.forecastMoveOverride=terminalSleepMovePayload(current,f);
    return true;
  }

  if(differentFamily.length) candidates=differentFamily;

  if(!candidates.length){
    if(shouldOfferTerminalSleepMove(current,f,candidates)){
      state.settings=state.settings||{};
      state.settings.forecastMoveOverride=terminalSleepMovePayload(current,f);
      return true;
    }

    setTimeout(()=>alert('No better alternate Peak Move is available right now. This one is still the best match.'),50);

  }

  const next=forecastMovePayloadFromCandidate(candidates[0],f);
  state.settings=state.settings||{};
  state.settings.forecastMoveOverride={
    ...next,
    date:todayKey(),
    period,
    released:false,
    source,
    previousMoveId:moveId,
    dismissedMoveIds:Array.from(dismissedIds),
    dismissedFamilies:Array.from(dismissedFamilies),
    dismissedDedupeGroups:Array.from(dismissedGroups),
    dedupeGroup:wave2MoveDedupeGroup(next),
    createdAt:new Date().toISOString()
  };
  return true;
}

function peakMoveDomain(moveChoice,ctx={}){

  const text=String(moveChoice?.text||moveChoice?.title||moveChoice?.move||'').toLowerCase();

  if(has('money','budget','debt','property','finance')) return 'Money / Future';
  if(has('father','adaya','daughter','parent','dad')) return 'Fatherhood';
  if(has('home','dishes','trash','laundry','surface','environment','robot','vacuum')) return 'Home / Environment';
  if(has('faith','prayer','zion','spiritual','values')) return 'Faith / Values';
  if(has('social','connection','conversation','loneliness')) return 'Mind / Mood';
  if(has('stress','overwhelm','irritability','mood','confidence','private','journal','reset','nervous','recover')) return 'Mind / Mood';
  if(has('sleep','night','caffeine','food','water','protein','walk','sunlight','body','energy','hydration','workout','rest')) return 'Body / Energy';

function forecastReasonGroup(reason, forecast=null){
  const text=String(reason?.text||reason||'').toLowerCase();
  const type=String(reason?.type||'');
  const period=String(forecast?.timePeriod||forecast?.timeframe||'').toLowerCase();
  const isNegativeLogged=/not logged|unprotected|missing|missed/.test(text);

  if(/confidence:|very low \(|days\)|not enough data/.test(text)) return 'Data confidence';
  if(/pattern:|transition|trend|avg|baseline|\d+\/\d+|low days|debt/.test(text)) return 'Trends';

  // Last-night items can explain today, but they are not the same as tonight's risk.
  // If the active forecast is not evening, the night-related chips are coming from the previous sleep-night.
  // Keep them under Carryover so yesterday's stressors do not look like tonight's stressors.
  if(/last night caffeine/.test(text)) return 'Carryover from last night';
  if(period!=='evening' && /late phone|night food|woke hungry|woke thirsty|morning sluggish|short sleep|sleep below target|sleep supported|slept worse|reflux|bloated|pre-bed|racing thoughts|stressors:|wired|tense/.test(text)) return 'Carryover from last night';

  // Current-day items that can still affect tonight belong here.
  if(/caffeine after|planned sleep|night reset|pre-bed|phone down|racing thoughts|stressors:|tomorrow minimum|wired|tense/.test(text)) return 'Tonight setup risk';

  if(/hydration not logged|water not logged|azure missing|money missing|fatherhood missing|social missing|no water|open time unprotected/.test(text)) return 'Today gaps';
  if(type==='good' || (!isNegativeLogged && /logged|connection|calm|strong|money check|azure rep|hydration cups|emergency reset|tomorrow minimum|night reset$|pre-bed normal|pre-bed calm|protected|lowered|done/.test(text))) return 'Protective';
  if(/energy|mood|focus|drive|confidence low|stress elevated|overwhelm|irritable|private escape|2-3h|current|low state/.test(text)) return 'Current state';
  if(/sleep|food|night|phone|hungry|sluggish|reflux|bloated|thirsty/.test(text)) return period==='evening'?'Tonight setup risk':'Carryover from last night';
  return 'Other';
}
function forecastReasonGroupsHtml(reasons, forecast=null){
  const order=['Current state','Carryover from last night','Tonight setup risk','Today gaps','Trends','Protective','Data confidence','Other'];
  const groups={};
  (reasons||[]).forEach(r=>{const g=forecastReasonGroup(r,forecast); (groups[g]=groups[g]||[]).push(r);});
  const html=order.filter(g=>groups[g]?.length).map(g=>`<div class="reasonGroup"><h3>${g}</h3><div class="chips compactReasons">${groups[g].map(r=>`<span class="chip ${r.type}">${esc(r.text)}</span>`).join('')}</div></div>`).join('');
  return html || '<span class="chip">No drivers logged yet</span>';
}

let exportProgressClearTimer=null;
function exportSleep(ms){return new Promise(resolve=>setTimeout(resolve,ms));}
function disableExportControls(disabled){
  try{
    document.querySelectorAll('button,label.btn').forEach(el=>{
      const txt=(el.textContent||'').toLowerCase();
      const oc=((el.getAttribute&&el.getAttribute('onclick'))||'').toLowerCase();
      const exportLike=txt.includes('export')||txt.includes('backup')||oc.includes('exportlifeupdate')||oc.includes('exportlevel5review')||oc.includes('exportphase17acceptance')||oc.includes('exportdata')||oc.includes('downloadbackupnow');
      if(!exportLike) return;
      if(disabled){el.setAttribute('data-export-disabled','1'); if('disabled' in el) el.disabled=true; el.classList.add('disabled');}
      else if(el.getAttribute('data-export-disabled')==='1'){el.removeAttribute('data-export-disabled'); if('disabled' in el) el.disabled=false; el.classList.remove('disabled');}
    });
  }catch(e){}
}
function setExportStatus(msg,kind=''){
  try{
    const text=document.getElementById('exportProgressText');
    const box=document.getElementById('exportProgressBox');
    const fallback=document.getElementById('exportStatus');
    if(text) text.textContent=msg||'';
    if(box){box.classList.toggle('warn',kind==='warn'); box.classList.toggle('done',kind==='done');}
    if(fallback) fallback.innerHTML=`<span class="saveDot ${kind==='warn'?'warn':''}"></span>${esc(msg||'')}`;
  }catch(e){}
}
function setExportProgress(p,msg,kind=''){
  try{
    const pct=Math.max(0,Math.min(100,Math.round(Number(p)||0)));
    const fill=document.getElementById('exportProgressFill');
    const pctEl=document.getElementById('exportProgressPct');
    const hint=document.getElementById('exportProgressHint');
    if(fill) fill.style.width=pct+'%';
    if(pctEl) pctEl.textContent=pct+'%';
    if(hint && msg) hint.textContent=kind==='done'?'Done. If Android asks, approve/save the download.':'Large exports may pause the app while the file is being built. Wait for the download prompt.';
    setExportStatus(msg,kind);
  }catch(e){setExportStatus(msg,kind);}
}
function startExportProgress(label){
  if(exportBusy){setExportProgress(8,'Export already building. Wait for it to finish.','warn'); return false;}
  exportBusy=true;
  if(exportProgressClearTimer) clearTimeout(exportProgressClearTimer);
  disableExportControls(true);
  setExportProgress(3,label||'Starting export...');
  return true;
}
function finishExportProgress(msg){
  setExportProgress(100,msg||'Export started.','done');
  exportProgressClearTimer=setTimeout(()=>{try{disableExportControls(false); exportBusy=false; setExportProgress(0,'Export ready');}catch(e){exportBusy=false;}},6500);

async function exportLifeUpdate(daysBack=7){
  const label=daysBack==='all'?'Starting full Life Update export...':`Starting ${daysBack}-day Life Update export...`;
  if(!startExportProgress(label)) return;
  try{
    setExportProgress(10,'Saving current input before export...');
    await exportSleep(50);
    try{commitFocusedField(); commitPendingRangeDrafts('life-update-export',{save:false}); save(true); flushPendingSaveNow('export');}catch(_e){}
    try{flushDeferredRecoveryWrites();}catch(_e){}
    setExportProgress(28,'Collecting recent day data...');
    await exportSleep(60);
    const update=buildLifeUpdate(daysBack);
    update.mobileExportNote='Life Update export is kept lighter than Level 5 Review so Android/Chrome downloads do not hang. Use the separate Level 5 Review buttons for deep app-tuning exports.';
    setExportProgress(72,'Preparing JSON download...');
    await exportSleep(45);
    const name=daysBack==='all'?`tyree-life-update-for-chatgpt-full-${todayKey()}.json`:`tyree-life-update-for-chatgpt-${daysBack}d-${todayKey()}.json`;
    const bytes=safeJsonDownload(update,name,true);
    finishExportProgress(`Export started: ${name} (${Math.max(1,Math.round(bytes/1024))} KB).`);
  }catch(e){
    const msg=(e&&e.message)?e.message:String(e||'unknown error');
    failExportProgress('Export failed: '+msg);
    alert('Export failed: '+msg);
  }
}

  if(level>=2) return 'Level 2 — Linked';
  return 'Level 1 — Logged';

function summarizeBottleneckHistory(forecasts=[]){
  const counts={}, urgency={}, evidence={};
  (forecasts||[]).forEach(row=>{
    const p=row?.primaryBottleneck || row?.bottlenecks?.primary || row?.summary?.primaryBottleneck;
    if(!p) return;
    const key=p.key||p.label||'unknown';
    counts[key]=(counts[key]||0)+1;
    urgency[key]=urgency[key]||{};
    const u=p.urgency||'Unknown';
    urgency[key][u]=(urgency[key][u]||0)+1;
    evidence[key]=evidence[key]||[];
    (p.evidence||[]).slice(0,2).forEach(x=>evidence[key].push(x));
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([key,count])=>({
    key,
    label:peakBottleneckName(key),
    count,
    urgency:urgency[key]||{},
    commonEvidence:[...new Set((evidence[key]||[]).map(growthSafeText))].slice(0,8)
  }));
}
function summarizeMoveFitHistory(forecasts=[]){
  const rows=[];
  (forecasts||[]).forEach(row=>{
    const rec=row?.recommendedBestMove||{};
    const fit=rec.moveFitBreakdown||row?.moveFitBreakdown||null;
    if(!fit) return;
    rows.push({
      date:row.date||row.day||'',
      move:rec.title||row.move||'',
      domain:rec.domain||rec.category||'',
      fitLabel:rec.moveFitLabel||fit.fitLabel||'',
      total:fit.total,
      currentStateFit:fit.currentStateFit,
      timeBlockFit:fit.timeBlockFit,
      goalGapFit:fit.goalGapFit,
      frictionFit:fit.frictionFit,
      realLifeFit:fit.realLifeFit,
      recoveryRiskFit:fit.recoveryRiskFit,
      growthValueFit:fit.growthValueFit,
      primaryBottleneck:fit.primaryBottleneck||row?.primaryBottleneck?.key||null,
      topReasons:(fit.reasons||[]).slice(0,4)
    });
  });
  const avgField=k=>rows.length?Math.round(average(rows.map(r=>Number(r[k])).filter(n=>Number.isFinite(n)))*10)/10:null;
  return {
    count:rows.length,
    averages:{
      total:avgField('total'),
      currentStateFit:avgField('currentStateFit'),
      timeBlockFit:avgField('timeBlockFit'),
      goalGapFit:avgField('goalGapFit'),
      frictionFit:avgField('frictionFit'),
      realLifeFit:avgField('realLifeFit'),
      recoveryRiskFit:avgField('recoveryRiskFit'),
      growthValueFit:avgField('growthValueFit')
    },
    recent:rows.slice(-20),
    strongest:rows.slice().filter(r=>Number(r.total)>0).sort((a,b)=>Number(b.total)-Number(a.total)).slice(0,8),
    weakest:rows.slice().sort((a,b)=>Number(a.total)-Number(b.total)).slice(0,8)
  };
}
function domainMaturitySummary(grades){
  const domains=grades?.domains||[];
  return {
    overallLevel:grades?.overallLevel||null,
    overallLabel:grades?.overallLabel||'',
    strongest:domains.slice().sort((a,b)=>b.level-a.level).slice(0,5).map(d=>({key:d.key,title:d.title,level:d.level,reason:d.reason})),
    weakest:domains.slice().sort((a,b)=>a.level-b.level).slice(0,5).map(d=>({key:d.key,title:d.title,level:d.level,missingPiece:d.missingPiece,nextUpgradeMove:d.nextUpgradeMove})),
    topGaps:grades?.topGaps||[]
  };
}

function targetSleepTimeValue(){
  return state.settings?.targetSleepTime || '23:00';

function setTargetSleepTime(v){
  state.settings=state.settings||{};
  state.settings.targetSleepTime = String(v||'23:00').slice(0,5);

function timeStringToMinutes(v){
  const m=String(v||'23:00').match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return 23*60;
  return Math.max(0,Math.min(1439,(Number(m[1])||0)*60+(Number(m[2])||0)));
}
function currentLocalMinutes(){
  const p=partsInZone(new Date());
  let h=Number(p.hour||0); if(h===24) h=0;
  return h*60+Number(p.minute||0);
}
function isAtOrAfterSleepTarget(){
  const now=currentLocalMinutes();
  const target=timeStringToMinutes(targetSleepTimeValue());
  // Treat after midnight but before rollover as still after the prior sleep target.
  return now>=target || now<300;
}
function minutesUntilSleepTarget(){
  const now=currentLocalMinutes();
  const target=timeStringToMinutes(targetSleepTimeValue());
  if(now<300) return 0;
  let diff=target-now;
  if(diff<0) diff+=1440;
  return diff;
}
function isNearOrAfterSleepTarget(windowMinutes=30){
  if(isAtOrAfterSleepTarget()) return true;
  return minutesUntilSleepTarget()<=windowMinutes;
}
function shouldAutoTerminalSleepMove(f=null){
  try{
    const period=f?.timePeriod||currentGuidePeriod().key;
    if(period!=='evening') return false;
    const near=isNearOrAfterSleepTarget(30);
    if(!near) return false;
    const key=f?.primaryBottleneck?.key||f?.bottlenecks?.primary?.key||'';
    const protective=(f?.level==='Red'||f?.moveSleepRelated||f?.moveHorizon==='tomorrow'||key==='recovery_risk'||key==='body_battery');
    return isAtOrAfterSleepTarget() || protective;
  }catch(e){return false;}
}

  const entries=recentEntries('all');
  backup._export={
    generatedAt:new Date().toISOString(),
    generatedAtLocal:localDateTimeLabel(new Date()),
    dayRollover:{mode:dayRolloverMode(),hint:dayRolloverHint(),effectiveDate:todayKey(),actualLocalDate:localDateKey(new Date())},
    forecastDaily:entries.filter(e=>e.data).map(forecastDayExport).filter(Boolean),
    appCapabilityGrades:appCapabilityGrades('all'),
    bodyPhysicalPeak:bodyPhysicalPeakProfile(entries),
    sleepRecovery:sleepRecoveryOverview(entries),
    azureCareerLevel5:azureCareerLevel5Overview(entries),
    learningKnowledge:learningKnowledgeOverview(entries),
    fatherhoodLevel5:fatherhoodLevel5Profile(entries),
    presenceLevel5:presenceReadinessProfile(entries),
    environmentLevel5:environmentFrictionProfile(entries),
    faithMeaningLevel5:faithMeaningProfile(entries),
    uiSafety:uiSafetyProfile(entries),
    peakForecastDisplay:peakForecastDisplayMaturity(entries),
    level5Review:buildLevel5ReviewExport('all'),
    phase16SpeedProfile:phase16SpeedProfile(),
    phase17Acceptance:{note:'Skipped in backup for speed. Use Level 5/Phase 17 export buttons when needed.'},
    forecastMoves:buildForecastMoveExport(entries)
  };
  annotateBackupIntegrity(backup);
  return backup;
}
function exportData(){downloadBackupNow('manual')}
function importData(file){if(!file)return; const r=new FileReader(); r.onload=e=>{try{const obj=JSON.parse(e.target.result); applyImportedStateObject(obj);}catch(err){alert('Invalid JSON')}}; r.readAsText(file)}
function resetApp(){const typed=prompt('This permanently clears all local app data. Export a backup first if needed. Type RESET to confirm.'); if((typed||'').trim().toUpperCase()==='RESET'){clearSavedRaw(); state=loadState(); navTabsBuilt=false; renderFullMigrateLastAt=Date.now(); inputUpdatedStampCacheReady=false; render(); alert('App data reset.')}}
function toggleTheme(){state.theme='dark'; state.settings=state.settings||{}; state.settings.themeLocked='dark'; save(); render()}
function saveOnExit(){try{commitFocusedField(); commitPendingRangeDrafts('exit',{save:false}); save(true); flushPendingSaveNow('exit'); flushSecondaryStorageWrites(); flushDeferredRecoveryWrites();}catch(e){try{state._savedAt=new Date().toISOString(); writeSavedState(); flushSecondaryStorageWrites();}catch(err){}}}
function isExportDownloadControl(e){
  try{
    const el=e&&e.target&&e.target.closest&&e.target.closest('button,label,a,input');
    if(!el) return false;
    const txt=(el.textContent||el.value||el.getAttribute('download')||'').toLowerCase();
    const attr=((el.getAttribute&&((el.getAttribute('onclick')||'')+' '+(el.getAttribute('onchange')||'')))||'').toLowerCase();
    return txt.includes('export') || txt.includes('download') || txt.includes('import') || txt.includes('backup') || attr.includes('export') || attr.includes('download') || attr.includes('import');
  }catch(err){return false;}
}
document.addEventListener('pointerdown', (e)=>{try{if(!isExportDownloadControl(e)) maybeAutoBackupDownload(true)}catch(err){}}, true);
document.addEventListener('keydown', (e)=>{try{if(!isExportDownloadControl(e)) maybeAutoBackupDownload(true)}catch(err){}}, true);
window.addEventListener('pagehide', saveOnExit);
window.addEventListener('beforeunload', saveOnExit);
window.addEventListener('blur', ()=>{try{commitFocusedField(); save(true);}catch(e){}});
window.addEventListener('focus', ()=>{setTimeout(()=>{try{mergeLatestSharedStateIfNewer(true); resetGuideOnTimeframeChange()}catch(e){}},80);});
window.addEventListener('storage', e=>{
  try{
    if([LS_KEY,STATE_BACKUP_KEY,STATE_LAST_GOOD_KEY,STATE_CRITICAL_KEY,STATE_CRITICAL_KEY+'_last_good'].includes(e.key)){
      setTimeout(()=>mergeLatestSharedStateIfNewer(true),50);
    }
  }catch(err){}
});
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) saveOnExit(); else setTimeout(()=>{try{mergeLatestSharedStateIfNewer(true); resetGuideOnTimeframeChange()}catch(e){}},80); });
document.addEventListener('input', e=>{
  const isRange=e.target&&e.target.tagName==='INPUT'&&String(e.target.type||'').toLowerCase()==='range';
  if(!isRange) queueInputUpdatedFromEvent(e);
  if(!isRange && e.target&&['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) scheduleAutosave();
}, true);
document.addEventListener('change', e=>{
  const isRange=e.target&&e.target.tagName==='INPUT'&&String(e.target.type||'').toLowerCase()==='range';
  if(!isRange) queueInputUpdatedFromEvent(e);
  if(!isRange && e.target&&['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) scheduleAutosave();
}, true);
document.addEventListener('click', e=>{
  queueInputUpdatedFromEvent(e);
  // Button handlers already save when they change data. Avoid saving the entire app on every tab/button click.
  if(e.target&&['INPUT','SELECT'].includes(e.target.tagName)) scheduleAutosave();
}, true);

function handleNightTargetEvent(e){
  const b=e.target?.closest?.('[data-night-target]');
  if(!b) return;
  try{e.preventDefault(); e.stopPropagation();}catch(err){}
  setNightTarget(b.dataset.nightTarget);
  return false;
}
document.addEventListener('pointerup', handleNightTargetEvent, true);
document.addEventListener('touchend', handleNightTargetEvent, true);
document.addEventListener('click', handleNightTargetEvent, true);
try{navigator.storage && navigator.storage.persist && navigator.storage.persist();}catch(e){}
try{resetGuideOnTimeframeChange();}catch(e){}
render();
hydrateFromIndexedDB();
setTimeout(()=>{
  try{
    if(autoBackupEnabled()){
      const last=state.settings?.autoBackupLastAt ? new Date(state.settings.autoBackupLastAt).getTime() : 0;
      if(!last || Date.now()-last >= autoBackupIntervalMs()) markAutoBackupDue(!last?'open':'interval');
      scheduleAutoBackupDownload();
      render();
    }
  }catch(e){}
},400);
setTimeout(updateSaveStatus,200);
