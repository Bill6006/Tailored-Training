@keyframes draftLogAmberFade{0%,100%{opacity:0}50%{opacity:.72}}
@keyframes draftLogGlowFade{0%,100%{box-shadow:0 0 0 rgba(251,146,60,0)}50%{box-shadow:0 0 0 2px rgba(251,146,60,.12),0 0 14px rgba(251,146,60,.20)}}
@keyframes snakeDashTravel{from{stroke-dashoffset:0}to{stroke-dashoffset:-100}}
.fieldSnakeWrap{position:relative;border-radius:12px}
.fieldSnakeWrap input,.fieldSnakeWrap textarea{position:relative;z-index:1}
.fieldSnakeOverlay{position:absolute;inset:-1px;width:calc(100% + 2px);height:calc(100% + 2px);pointer-events:none;overflow:visible;z-index:2;opacity:0;transition:opacity .18s ease}
.fieldSnakeWrap.draftFieldTrail .fieldSnakeOverlay,.fieldSnakeWrap.editingFieldTrail .fieldSnakeOverlay{opacity:1}
.fieldSnakeOverlay .snakeBase{fill:none;stroke:rgba(251,146,60,.16);stroke-width:1;vector-effect:non-scaling-stroke}
.fieldSnakeOverlay .snakeGlow{fill:none;stroke:rgba(251,146,60,.22);stroke-width:3;stroke-linecap:round;stroke-dasharray:7 93;animation:snakeDashTravel 2.6s linear infinite;filter:blur(.7px);opacity:.38;vector-effect:non-scaling-stroke}
.fieldSnakeOverlay .snakeTrail{fill:none;stroke:rgba(255,185,105,.92);stroke-width:1.6;stroke-linecap:round;stroke-dasharray:7 93;animation:snakeDashTravel 2.6s linear infinite;filter:drop-shadow(0 0 3px rgba(251,146,60,.38));vector-effect:non-scaling-stroke}

function guidePeriodHasAnyLoggedData(period){
  try{
    const d=day();
    if(!d) return false;

    // Time-block sliders: Energy, mood, current effects, therapy sliders, etc.
    const rp=d._rangePeriods||{};
    if(Object.values(rp).some(row=>row && row[period] && row[period].loggedAt)) return true;

    const food=d.dayFood?.[period];
    if(food && Object.entries(food).some(([k,v])=>!!v && !(period==='morning' && k==='noBreakfast'))) return true;

    // Mood timeline entries for that block.
    if(Array.isArray(d.moodTimeline) && d.moodTimeline.some(x=>x && x.period===period)) return true;

    // Energy symptom entries for that block.
    if(Array.isArray(d.energySymptoms?.entries) && d.energySymptoms.entries.some(x=>x && x.period===period)) return true;

    if(period==='morning' && d.morningStart){
      if(['bathroom','light','food','phoneBoundary'].some(k=>!!d.morningStart[k])) return true;
      if(String(d.morningStart.notes||'').trim()) return true;
    }

    return false;
  }catch(e){return false;}
}

function guideStatusForPeriod(period){

  const current=currentGuidePeriod().key;

    evening: state.settings.lastEveningGuideCompletedDay===todayKey()
  };

  if(done[period]) return {cls:'done', state:'Done', label:labels[period], title:fullName+' guide completed'};

function timePartsFromValue(v){
  v=String(v||'').trim();
  if(!v) return {hour:'',minute:'',ampm:''};
  let m=v.match(/^(\d{1,2}):(\d{2})$/);
  if(m){
    let h=Number(m[1]), minute=m[2];
    if(Number.isNaN(h)) return {hour:'',minute:'',ampm:''};
    const ampm=h>=12?'PM':'AM';
    h=h%12; if(h===0) h=12;
    return {hour:String(h),minute,ampm};
  }
  m=v.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)$/i);
  if(m){return {hour:String(Number(m[1])),minute:m[2]||'00',ampm:m[3].toUpperCase()};}
  return {hour:'',minute:'',ampm:''};
}
function to24Hour(hour,minute,ampm){
  if(!hour || !minute || !ampm) return '';
  let h=Number(hour), m=String(minute).padStart(2,'0');
  if(Number.isNaN(h) || h<1 || h>12) return '';
  if(ampm==='PM' && h!==12) h+=12;
  if(ampm==='AM' && h===12) h=0;
  return String(h).padStart(2,'0')+':'+m;
}
function formatTimeLabel(v){
  const p=timePartsFromValue(v);
  return p.hour ? `${p.hour}:${p.minute} ${p.ampm}` : '';
}
function parseLooseTime(raw, defaultAmpm=''){
  let v=String(raw||'').trim().toLowerCase();
  if(!v) return '';
  v=v.replace(/\./g,'').replace(/\s+/g,'');
  let ampm='';
  const ampmMatch=v.match(/(am|pm|a|p)$/i);
  if(ampmMatch){
    ampm=ampmMatch[1].toLowerCase().startsWith('p')?'PM':'AM';
    v=v.slice(0,-ampmMatch[1].length);
  }
  v=v.replace(/[^0-9:]/g,'');
  if(!v) return '';
  let h='', minute='00';
  if(v.includes(':')){
    const parts=v.split(':');
    h=parts[0]; minute=(parts[1]||'00').padEnd(2,'0').slice(0,2);
  } else if(v.length<=2){
    h=v; minute='00';
  } else {
    h=v.slice(0,-2); minute=v.slice(-2);
  }
  let hour=Number(h), min=Number(minute);
  if(Number.isNaN(hour)||Number.isNaN(min)||min<0||min>59) return '';
  if(hour===24) hour=0;
  if(hour>12){
    if(hour>23) return '';
    return String(hour).padStart(2,'0')+':'+String(min).padStart(2,'0');
  }
  if(hour<1 || hour>12) return '';
  if(!ampm) ampm=defaultAmpm || (hour>=4 && hour<=8 ? 'AM' : 'PM');
  return to24Hour(String(hour),String(min).padStart(2,'0'),ampm);
}

function commitRangeValueCanonical(key,value,opts={}){

  try{

    d._logged=d._logged||{};

    if(isTimeAwareRangeKey(k)){

function repairCanonicalRangeLogsForDay(d){

        const row=d._rangePeriods[k][p];

          if(fallback!==null){

function forecastTimeWindow(dt=new Date()){
  const parts=partsInZone(dt);
  const hRaw=Number(parts.hour||0);
  const h=hRaw===24?0:hRaw;
  const m=Number(parts.minute||0);
  const minutes=h*60+m;
  const between=(a,b)=>minutes>=a && minutes<b;
  if(between(0,240)) return {key:'after_midnight',label:'After midnight',hour:h,minute:m,minutes,theme:'close_day'};
  if(between(240,480)) return {key:'early_morning',label:'Early morning',hour:h,minute:m,minutes,theme:'wake_floor'};
  if(between(480,720)) return {key:'late_morning',label:'Late morning',hour:h,minute:m,minutes,theme:'focus_window'};
  if(between(720,840)) return {key:'early_afternoon',label:'Early afternoon',hour:h,minute:m,minutes,theme:'focus_or_refuel'};
  if(between(840,960)) return {key:'mid_afternoon',label:'Mid afternoon',hour:h,minute:m,minutes,theme:'crash_prevention'};
  if(between(960,1020)) return {key:'late_afternoon',label:'Late afternoon',hour:h,minute:m,minutes,theme:'transition'};
  if(between(1020,1140)) return {key:'early_evening',label:'Early evening',hour:h,minute:m,minutes,theme:'dinner_transition'};
  if(between(1140,1260)) return {key:'mid_evening',label:'Mid evening',hour:h,minute:m,minutes,theme:'light_closeout'};
  return {key:'late_evening',label:'Late evening',hour:h,minute:m,minutes,theme:'sleep_protection'};
}

const SMART_CHECK_IN_AFTER_GUIDE_MINUTES = 60;
const SMART_CHECK_IN_REFRESH_MINUTES = 60;
function minutesSinceIso(iso){
  if(!iso) return null;
  const t=new Date(iso).getTime();
  if(!Number.isFinite(t)) return null;
  return Math.max(0,(Date.now()-t)/60000);
}
function guideCompletedAtForPeriod(period){
  const s=state.settings||{};
  if(period==='morning') return s.lastMorningGuideCompletedAt||null;
  if(period==='afternoon') return s.lastAfternoonGuideCompletedAt||null;
  if(period==='evening') return s.lastEveningGuideCompletedAt||null;
  return null;
}
function smartCheckDelayStatus(period){
  let elapsed=null;
  let basis='period';
  const completedAt=guideCompletedAtForPeriod(period);
  if(completedAt){
    elapsed=minutesSinceIso(completedAt);
    basis='guide_completed';
  }
  if(elapsed===null){
    // Older backups only stored the completed day, not the exact time.
    // Fall back to time-block age so old data does not lock the button forever.
    elapsed=currentPeriodElapsedMinutes();
    basis='period_elapsed';
  }
  const wait=Math.max(0,Math.ceil(SMART_CHECK_IN_AFTER_GUIDE_MINUTES-elapsed));
  return {ready:elapsed>=SMART_CHECK_IN_AFTER_GUIDE_MINUTES,elapsed,wait,basis};
}

function minutesSinceLatestRangeLog(keys, periodKey){
  const times=(keys||[]).map(k=>{
    const iso=rangeLoggedAtForGuide(k,periodKey);
    const t=iso?new Date(iso).getTime():NaN;
    return Number.isFinite(t)?t:null;
  }).filter(t=>t!==null);
  if(!times.length) return Infinity;
  return Math.max(0,(Date.now()-Math.max(...times))/60000);
}
function smartCheckShouldRefreshRanges(periodKey, keys){

    if(!guideCompletedForPeriod(p)) return false;
    if(!(keys||[]).every(k=>rangeLoggedForGuide(k,p))) return false;

  }catch(e){return false;}
}

function persistGuideState(){
  state.settings=state.settings||{};
  try{if(guideState) guideState.updatedAt=new Date().toISOString();}catch(e){}
  state.settings.activeTab=active||'today';
  syncGuideStateToSettings();
  try{save(true);}catch(e){try{writeSavedState();}catch(err){}}
}
function resetGuideOnTimeframeChange(){
  state.settings=state.settings||{};
  if(guideState?.manualPeriodOverride){
    state.settings.lastGuidePeriod=guideState.period;
    persistGuideState();
    return false;
  }
  const gp=currentGuidePeriod();
  const last=state.settings.lastGuidePeriod;
  if(!last){
    state.settings.lastGuidePeriod=gp.key;
    persistGuideState();
    return false;
  }
  if(last===gp.key) return false;
  state.settings.lastGuidePeriod=gp.key;
  const hadGuide=!!guideState;
  if(guideState && guideState.period!==gp.key){
    guideState=null;
    state.settings.guideState=null;
    active='today';
    state.settings.activeTab=active;
    safeLocalSet('tlcc_active',active);
  }
  persistGuideState();
  render();
  return true;
}

function applyGuideStepSideEffects(step){
  if(!guideState || !guideStepUsesNightRecord(step)) return;

function goGuideStep(stepIndex){
  if(!guideState) return;
  const steps=safeGuideSteps(guideState.period);
  const privateIdx=steps.findIndex(s=>s.selector==='#guide-pattern-private');
  // Hold only during the active 2–3h follow-up window.
  // Backdated or missed-window private events do not trap the guide.
  if(privateIdx>=0 && stepIndex>privateIdx && privateGuideHoldNeeded()){
    stepIndex=privateIdx;
  }
  if(stepIndex>=steps.length){completeGuide(); return;}
  guideState.step=Math.max(0,stepIndex);
  applyGuideStepSideEffects(steps[guideState.step]);
  active=steps[guideState.step].tab;
  safeLocalSet('tlcc_active',active); state.settings.activeTab=active;
  persistGuideState();
  render();
}
function guideNext(){if(guideState) goGuideStep(guideState.step+1)}

function completeGuide(){
  const finishedGuide=guideState?deepClone(guideState):null;
  const donePeriod=finishedGuide?.period;
  const completedAt=new Date().toISOString();
  state.settings=state.settings||{};
  if(donePeriod==='weekly'){
    migrate(state);
    state.adaya.weekly=state.adaya.weekly||{};
    state.adaya.weekly.lastGuideCompletedWeek=weekStartKey(todayKey());
    state.adaya.weekly.lastGuideCompletedAt=completedAt;
  }
  if(donePeriod==='morning'){
    state.settings.lastMorningGuideCompletedDay=todayKey();
    state.settings.lastMorningGuideCompletedAt=completedAt;
  }
  if(donePeriod==='afternoon'){
    state.settings.lastAfternoonGuideCompletedDay=todayKey();
    state.settings.lastAfternoonGuideCompletedAt=completedAt;
  }
  if(donePeriod==='evening'){
    state.settings.lastEveningGuideCompletedDay=todayKey();
    state.settings.lastEveningGuideCompletedAt=completedAt;
  }
  if(donePeriod==='smart'){
    state.settings.lastSmartCheckInCompletedAt=completedAt;
    state.settings.lastSmartCheckInCompletedSourcePeriod=finishedGuide?.sourcePeriod||currentGuidePeriod().key;
  }
  // Completion and active-guide clearing must be saved together.
  // Otherwise older recovery/session candidates can restore an incomplete guide after the Done badge persists.
  guideState=null;
  state.settings.guideState=null;
  state.settings.lastGuideStateClearedAt=completedAt;
  try{markInputUpdated(completedAt);}catch(e){}
  try{save(true); flushPendingSaveNow('guide-complete'); flushSecondaryStorageWrites();}catch(e){try{writeSavedState();}catch(err){}}
  const box=document.getElementById('guideControls');
  if(box){box.className='guideControls hidden'; box.innerHTML='';}
  document.querySelectorAll('.guideTarget').forEach(el=>el.classList.remove('guideTarget'));
  nav();
  try{renderGuideStatusBadges();}catch(e){}
}

}

function weekdayForDateKey(k=todayKey()){
  try{
    const [y,m,d]=String(k).split('-').map(Number);
    return new Intl.DateTimeFormat('en-US',{timeZone:APP_TIME_ZONE,weekday:'long'}).format(new Date(Date.UTC(y,m-1,d,12,0,0)));
  }catch(e){return '';}
}
function isSaturdayKey(k=todayKey()){return weekdayForDateKey(k)==='Saturday';}

function weekdayPatternConfidence(count){
  count=Number(count)||0;
  if(count<=2) return {tier:'collecting',label:'Collecting',forecastWeight:0,usable:false,rule:'0–2 matching weekdays: collect only'};
  if(count<=4) return {tier:'early',label:'Early signal',forecastWeight:.15,usable:false,rule:'3–4 matching weekdays: show only as early signal'};
  if(count<=7) return {tier:'light',label:'Light influence',forecastWeight:.3,usable:true,rule:'5–7 matching weekdays: light forecast influence'};
  return {tier:'stronger',label:'Stronger signal',forecastWeight:.55,usable:true,rule:'8+ matching weekdays: stronger forecast influence'};
}
function weekdayPatternLayer(daysBack='all'){
  return renderCacheGet('weekdayPatternLayer|'+String(daysBack)+'|'+todayKey(),()=>{
  const entries=recentEntries(daysBack).filter(e=>e.data).map(e=>({date:e.date,data:migrateDay(e.data)}));
  const weekdays=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const boolRate=(rows,fn)=>rows.length?Math.round(rows.filter(fn).length/rows.length*100):0;
  const avg=(rows,fn)=>average(rows.map(fn).filter(v=>Number.isFinite(Number(v))).map(Number));
  const groupStats=(rows,label)=>{
    rows=rows||[];
    const scores=rows.map(r=>scoreDay(r.data).pct).filter(v=>Number.isFinite(Number(v)));
    return {
      label,count:rows.length,confidence:weekdayPatternConfidence(rows.length),
      averages:{energy:avg(rows,r=>+r.data.energy),mood:avg(rows,r=>+r.data.mood),sleepHours:avg(rows,r=>+r.data.sleep),lifeScore:average(scores)},
      completionRates:{
        water:boolRate(rows,r=>!!r.data.water || !!r.data.health?.hydration || Object.values(r.data.dayFood||{}).some(p=>p&&p.water)),
        workout:boolRate(rows,r=>!!r.data.workout || !!r.data.health?.workout || !!r.data.health?.walk),
        azure:boolRate(rows,r=>!!r.data.azure),
        money:boolRate(rows,r=>!!r.data.money),
        homeReset:boolRate(rows,r=>!!r.data.home),
        nightReset:boolRate(rows,r=>!!r.data.night),
        fatherhood:boolRate(rows,r=>!!r.data.fatherCheck),
        social:boolRate(rows,r=>!!r.data.socialCheck),
        fastFood:boolRate(rows,r=>!!r.data.health?.fastFood || Object.values(r.data.dayFood||{}).some(p=>p&&p.fastFood))
      }
    };
  };
  const byWeekday={};
  weekdays.forEach(w=>{byWeekday[w]=[];});
  entries.forEach(e=>{const w=weekdayForDateKey(e.date); if(byWeekday[w]) byWeekday[w].push(e);});
  const weekdayStats=Object.fromEntries(weekdays.map(w=>[w,groupStats(byWeekday[w],w)]));
  const workdays=entries.filter(e=>!['Saturday','Sunday'].includes(weekdayForDateKey(e.date)));
  const weekends=entries.filter(e=>['Saturday','Sunday'].includes(weekdayForDateKey(e.date)));
  const saturdays=byWeekday.Saturday||[];
  const sundays=byWeekday.Sunday||[];
  const todayName=weekdayForDateKey(todayKey());
  const todayStats=weekdayStats[todayName]||groupStats([],todayName);
  const sundayMondayPairs=sundays.map(s=>{
    const monKey=offsetDateKey(s.date,1);
    const mon=entries.find(e=>e.date===monKey);
    if(!mon) return null;
    return {sunday:s.date,monday:monKey,sundayReset:!!(s.data.night||s.data.home),sundayNightReset:!!s.data.night,mondayEnergy:+mon.data.energy||null,mondayMood:+mon.data.mood||null,mondayLifeScore:scoreDay(mon.data).pct};
  }).filter(Boolean);
  const sundayResetPairs=sundayMondayPairs.filter(x=>x.sundayReset);
  const sundayNoResetPairs=sundayMondayPairs.filter(x=>!x.sundayReset);
  return {
    status:'prepared_collecting',
    description:'Weekday Pattern Layer is fully wired and will unlock gradually as matching weekdays build up.',
    unlockRules:{collectOnly:'0–2 matching weekdays',earlySignal:'3–4 matching weekdays',lightInfluence:'5–7 matching weekdays',strongerInfluence:'8+ matching weekdays'},
    totalDays:entries.length,
    today:{weekday:todayName,...todayStats},
    byWeekday:weekdayStats,
    workdayVsWeekend:{workday:groupStats(workdays,'Workday'),weekend:groupStats(weekends,'Weekend')},
    saturdayChurch:{...groupStats(saturdays,'Saturday'),churchDays:saturdays.filter(e=>!!e.data.saturday?.churchAllDay).length,protectOpenTimeRate:boolRate(saturdays,e=>!!e.data.saturday?.protectOpenTime),afterChurchResetRate:boolRate(saturdays,e=>!!e.data.saturday?.afterChurchReset)},
    sundayReset:{...groupStats(sundays,'Sunday'),mondayPairs:sundayMondayPairs.length,afterSundayReset:{count:sundayResetPairs.length,mondayEnergy:avg(sundayResetPairs,x=>x.mondayEnergy),mondayMood:avg(sundayResetPairs,x=>x.mondayMood),mondayLifeScore:avg(sundayResetPairs,x=>x.mondayLifeScore)},afterSundayNoReset:{count:sundayNoResetPairs.length,mondayEnergy:avg(sundayNoResetPairs,x=>x.mondayEnergy),mondayMood:avg(sundayNoResetPairs,x=>x.mondayMood),mondayLifeScore:avg(sundayNoResetPairs,x=>x.mondayLifeScore)}},
    recentByWeekday:entries.slice(-14).map(e=>({date:e.date,weekday:weekdayForDateKey(e.date),energy:+e.data.energy||null,mood:+e.data.mood||null,sleep:+e.data.sleep||null,lifeScore:scoreDay(e.data).pct,water:!!e.data.water,azure:!!e.data.azure,money:!!e.data.money,nightReset:!!e.data.night}))
  };
  });
}
function weekdayPatternForForecast(dateKey=todayKey()){
  const layer=weekdayPatternLayer('all');
  const w=weekdayForDateKey(dateKey);
  const stats=layer.byWeekday?.[w]||layer.today;
  const confidence=weekdayPatternConfidence(stats?.count||0);
  return {weekday:w,count:stats?.count||0,confidence,averages:stats?.averages||{},completionRates:stats?.completionRates||{},usable:confidence.usable,forecastWeight:confidence.forecastWeight};
}

function sleepRecoveryRiskProfile(d=day()){
  d=migrateDay(d||day());
  const r=ensureRecoveryFields(d);
  const dateKey=dateKeyForRecord(d);
  const ctxBase=actualNightRecordsForDate(dateKey,d);
  const tonight=ctxBase.tonight.record||blankNightInputs();
  const p=d.pattern||defaultPattern();
  const currentCaffeine=latestCaffeineWindow(d,p,'evening',dateKey);
  const sleepTarget=sleepFromPattern({bedtime:r.targetBedtime||tonight.bedtime,wakeTime:r.targetWakeTime||tonight.wakeTime});
  const latestCaf=['after2','after4','after6'].includes(currentCaffeine);
  const veryLateCaf=['after4','after6'].includes(currentCaffeine);
  const foodRisk=nightFoodRisk(tonight) || nightFoodRisk(p);
  const stressRisk=!!(tonight.racingThoughts||tonight.stressWork||tonight.stressMoney||tonight.stressParenting||tonight.stressExFamily||tonight.stressConflict||tonight.stressBody||p.racingThoughts||p.nightOverthinking);
  const tomorrowMin=!!(r.tomorrowMinimum || recoveryTomorrowMinimumText(d));
  const wakeSet=!!(r.wakeTimeSet || r.targetWakeTime || tonight.wakeTime || p.wakeTime);
  const bedSet=!!(r.targetBedtime || tonight.bedtime || p.bedtime);
  const phoneBoundary=!!(r.phoneBoundary || d.morningStart?.phoneBoundary);
  const caffeineCutoff=!!r.caffeineCutoff || (!latestCaf && currentCaffeine==='none');
  const morningCue=!!(r.morningCue || String(r.morningCueText||'').trim());
  const anchors=[
    {key:'caffeineCutoff',label:'Caffeine cutoff',done:caffeineCutoff},
    {key:'phoneBoundary',label:'Phone boundary',done:phoneBoundary},
    {key:'sleepWake',label:'Sleep/wake time',done:wakeSet||bedSet},
    {key:'tomorrowMinimum',label:'Tomorrow minimum',done:tomorrowMin},
    {key:'morningCue',label:'Morning cue',done:morningCue},
    {key:'lightCloseout',label:'Light closeout',done:!!r.lightCloseout},
    {key:'bedroomReady',label:'Bedroom ready',done:!!r.bedroomReady}
  ];
  const doneCount=anchors.filter(x=>x.done).length;
  let risk=42;
  const reasons=[];
  const add=(amount,reason)=>{risk+=amount; if(reason) reasons.push(reason);};
  const protect=(amount,reason)=>{risk-=amount; if(reason) reasons.push(reason);};
  if(latestCaf) add(14,'late caffeine');
  if(veryLateCaf) add(8,'very late caffeine');
  if(!phoneBoundary) add(10,'phone boundary open'); else protect(7,'phone boundary set');
  if(!tomorrowMin) add(8,'tomorrow minimum missing'); else protect(7,'tomorrow minimum set');
  if(!wakeSet && !bedSet) add(8,'sleep/wake time not set'); else protect(7,'sleep/wake time set');
  if(!morningCue) add(6,'morning cue missing'); else protect(5,'morning cue set');
  if(foodRisk) add(8,'night food risk');
  if(stressRisk) add(9,'pre-bed stress/racing thoughts');
  if(r.lightCloseout) protect(5,'light closeout logged');
  if(r.bedroomReady) protect(4,'bedroom ready');
  if(d.night) protect(8,'night reset logged');
  if(doneCount>=4) protect(8,'sleep anchor mostly protected');
  if(sleepTarget!==null && sleepTarget<6.5) add(7,'target sleep below 6.5h');
  if(sleepTarget!==null && sleepTarget>=7) protect(6,'target sleep supports tomorrow');
  risk=Math.max(0,Math.min(100,Math.round(risk)));
  const level=risk>=70?'High risk':risk>=50?'At risk':risk>=30?'Watch':'Protected';
  const mode=risk>=70?'Protect now':risk>=50?'Stabilize tonight':risk>=30?'Tighten anchor':'Protected';
  const baseProfile={
    risk,level,mode,doneAnchors:doneCount,totalAnchors:anchors.length,anchors,
    missingAnchors:anchors.filter(x=>!x.done).map(x=>x.label),
    reasons:reasons.slice(0,8),
    caffeineWindow:currentCaffeine,
    sleepTargetHours:sleepTarget,
    nightFoodRisk:!!foodRisk,
    stressRisk:!!stressRisk
  };
  const nextAnchor=chooseNextRecoveryAnchor(d,baseProfile);
  return {...baseProfile,nextRecoveryAnchor:nextAnchor,nextBestAnchor:nextAnchor?.label||'Keep it protected'};
}

function forecastPathScoreKind(score,meaning='outlook'){

function forecastPathTrend(blocks,idx){
  const cur=blocks[idx];

  const prev=[...blocks.slice(0,idx)].reverse().find(b=>b&&Number.isFinite(Number(b.score)));
  if(!prev) return '→ current read';
  const delta=Number(cur.score)-Number(prev.score);
  if(delta>=8) return `↗ +${Math.round(delta)}`;
  if(delta<=-8) return `↘ ${Math.round(delta)}`;
  return '→ steady';
}

function environmentRepOptions(){
  return [
    {key:'robotVacuum',label:'Robot vacuum',credit:'machine reset'},
    {key:'dishwasher',label:'Dishwasher',credit:'machine reset'},
    {key:'laundry',label:'Laundry load',credit:'machine reset'},
    {key:'trash',label:'Trash',credit:'friction removed'},
    {key:'clearSurface',label:'Clear surface',credit:'visible reset'},
    {key:'resetArea',label:'One reset area',credit:'space support'},
    {key:'morningPrep',label:'Morning prep',credit:'tomorrow easier'},
    {key:'entryReset',label:'Entry reset',credit:'arrival feels better'}
  ];
}
function environmentRepLabel(key){
  const hit=environmentRepOptions().find(x=>x.key===key);
  return hit?hit.label:'Environment rep';
}
function environmentScoreForDay(d=day()){
  const e=ensureEnvironmentFields(d);
  let score=0;
  if(e.robotVacuum || e.dishwasher || e.laundry || e.machineStarted) score+=2;
  if(e.trash) score+=1;
  if(e.clearSurface || e.visibleWin) score+=1;
  if(e.resetArea) score+=1;
  if(e.morningPrep) score+=1;
  if(e.entryReset) score+=1;
  if(e.environmentAdvantage) score+=2;
  if(d.home) score=Math.max(score,2);
  return Math.min(9,score);
}
function environmentStageFromScore(score){
  score=Number(score)||0;
  if(score>=8) return 'Environment Advantage';
  if(score>=6) return 'Low Friction';
  if(score>=3) return 'Reset Started';
  if(score>=1) return 'One Machine / Tiny Reset';
  return 'Friction High';
}
function environmentFrictionProfile(entries=recentEntries(7)){
  const rows=(entries||[]).filter(e=>e&&e.data).map(e=>({date:e.date,data:migrateDay(e.data)}));
  const pct2=fn=>rows.length?Math.round(rows.filter(fn).length/rows.length*100):0;
  const scores=rows.map(r=>environmentScoreForDay(r.data));
  const currentScore=environmentScoreForDay(day());
  const current=ensureEnvironmentFields(day());
  const repCounts={};
  environmentRepOptions().forEach(o=>repCounts[o.key]=0);
  rows.forEach(r=>{
    const env=ensureEnvironmentFields(r.data);
    environmentRepOptions().forEach(o=>{if(env[o.key]) repCounts[o.key]++;});
  });
  return {
    days:rows.length,
    current:{score:currentScore,stage:environmentStageFromScore(currentScore),reps:environmentRepOptions().filter(o=>current[o.key]).map(o=>o.key),resetAreaName:current.resetAreaName||'',morningPrepItem:current.morningPrepItem||''},
    averageScore:average(scores),
    repCounts,
    rates:{
      homeReset:pct2(r=>!!r.data.home || environmentScoreForDay(r.data)>0),
      machineStarted:pct2(r=>{const e=ensureEnvironmentFields(r.data); return !!(e.robotVacuum||e.dishwasher||e.laundry||e.machineStarted);}),
      visibleWin:pct2(r=>{const e=ensureEnvironmentFields(r.data); return !!(e.clearSurface||e.visibleWin||e.resetArea);}),
      morningPrep:pct2(r=>!!ensureEnvironmentFields(r.data).morningPrep),
      trash:pct2(r=>!!ensureEnvironmentFields(r.data).trash),
      advantage:pct2(r=>!!ensureEnvironmentFields(r.data).environmentAdvantage)
    },
    rule:'Level 5 environment means low-friction machine resets, visible wins, and tomorrow prep without full-cleaning pressure.'
  };
}
function logEnvironmentRep(key){
  const d=day(), e=ensureEnvironmentFields(d);
  e[key]=true;
  e.at=new Date().toISOString();
  e.repLog.push({key,label:environmentRepLabel(key),at:e.at,period:currentGuidePeriod().key});
  e.repLog=e.repLog.slice(-40);
  if(['robotVacuum','dishwasher','laundry'].includes(key)) e.machineStarted=true;
  if(['clearSurface','resetArea','entryReset'].includes(key)) e.visibleWin=true;
  if(environmentScoreForDay(d)>=6) e.environmentAdvantage=true;
  d.home=true;
  d._logged=d._logged||{};
  d._logged.home=true;
  d._logged['environment.'+key]=true;
  save(); render();
}
function setEnvironmentText(key,val){
  const d=day(), e=ensureEnvironmentFields(d);
  e[key]=val;
  e.at=new Date().toISOString();
  d._logged=d._logged||{};
  d._logged['environment.'+key]=true;
  if(String(val||'').trim() && ['resetAreaName','morningPrepItem','advantageNote'].includes(key)){
    if(key==='resetAreaName') e.resetArea=true;
    if(key==='morningPrepItem') e.morningPrep=true;
    if(key==='advantageNote') e.environmentAdvantage=true;
    d.home=true; d._logged.home=true;
  }
  save(); render();
}
function environmentBestRepRecommendation(ctx=null){
  const e=ensureEnvironmentFields(day());
  const lowDrive=(ctx?.drive||day().pattern?.driveLevel||5)<=4;
  const highOverwhelm=(ctx?.overwhelm||day().therapy?.overwhelm||5)>=7;
  const evening=ctx?.periodKey==='evening';
  if(!e.robotVacuum && lowDrive) return {key:'robotVacuum',text:'Start robot vacuum if available. Let the machine do the reset.'};
  if(!e.dishwasher) return {key:'dishwasher',text:'Start or load dishwasher. One machine reset is enough.'};
  if(!e.laundry && !highOverwhelm) return {key:'laundry',text:'Start one laundry load. Do not turn it into a full clean.'};
  if(!e.trash) return {key:'trash',text:'Trash reset: remove the obvious friction.'};
  if(!e.clearSurface) return {key:'clearSurface',text:'Clear one visible surface for 3 minutes.'};
  if(evening && !e.morningPrep) return {key:'morningPrep',text:'Prep one morning item so tomorrow starts easier.'};
  if(!e.entryReset) return {key:'entryReset',text:'Entry reset: make walking in feel less draining.'};
  return {key:'environmentAdvantage',text:'Environment advantage: make one small thing easier for future you.'};
}
function renderEnvironmentLevel5Card(){

  const barPct=Math.round((prof.current.score/9)*100);
  return `<div class="card span12" id="guide-environment-level5"><div class="row"><h2>Home / Environment Level 5</h2><span class="chip ${prof.current.score>=6?'good':prof.current.score>=3?'warn':'bad'}">${esc(prof.current.stage)}</span></div><p class="tiny">This is not “clean the whole house.” It is lowering friction so your next block is easier.</p><div class="kpi"><div><div class="tiny">Environment score</div><div class="num">${prof.current.score}/9</div></div><div class="tiny">Best lever: ${esc(rec.text)}</div></div><div class="bar ${prof.current.score<3?'danger':prof.current.score<6?'warn':''}"><i style="width:${barPct}%"></i></div><div class="grid" style="margin-top:10px"><div class="card span5"><h3>Best reset now</h3><div class="quote">${esc(rec.text)}</div><button class="btn small primary" onclick="logEnvironmentRep('${rec.key}')">Do / log this reset</button><div class="chips" style="margin-top:8px"><span class="chip">Machine ${prof.rates.machineStarted}%</span><span class="chip">Visible ${prof.rates.visibleWin}%</span><span class="chip">Prep ${prof.rates.morningPrep}%</span><span class="chip">Home ${prof.rates.homeReset}%</span></div></div><div class="card span7"><h3>Low-friction reset options</h3><div class="chips">${btns}</div><p class="tiny">Use machines first when drive is low. One reset counts.</p></div></div><div class="grid" style="margin-top:10px"><div class="card span4"><h3>Reset area</h3><input placeholder="Example: kitchen counter, entry, desk" value="${esc(e.resetAreaName||'')}" onchange="setEnvironmentText('resetAreaName',this.value)"></div><div class="card span4"><h3>Morning prep</h3><input placeholder="Example: clothes, water, laptop, bag" value="${esc(e.morningPrepItem||'')}" onchange="setEnvironmentText('morningPrepItem',this.value)"></div><div class="card span4"><h3>Friction note</h3><input placeholder="What kept draining you?" value="${esc(e.frictionNote||'')}" onchange="setEnvironmentText('frictionNote',this.value)"></div></div></div>`;
}

function caffeineRecoveryNeedScore(deep,d=day()){
  try{
    d=migrateDay(d||day());
    const prev=deep?.previousNight||{};
    const seven=deep?.trends?.seven||{};
    const sleep=Number(prev.sleepHours||d.sleep||0);
    const recoveryRisk=Number(deep?.recoveryRisk||0);
    const energy=Number(deep?.energy||d.energy||5);
    const drive=Number(deep?.drive||5);
    const focus=Number(deep?.focus||5);
    let score=0;
    const reasons=[];

    if(!!prev.lateCaffeine || d.pattern?.caffeineAfter6 || d.pattern?.tonight?.caffeineAfter6){score+=35; reasons.push('late caffeine');}
    if(sleep>0 && sleep<5.5){score+=28; reasons.push('short sleep');}
    else if(sleep>0 && sleep<6.25){score+=16; reasons.push('light sleep debt');}
    if(recoveryRisk>=70){score+=30; reasons.push('high recovery risk');}
    else if(recoveryRisk>=55){score+=18; reasons.push('medium recovery risk');}
    if(deep?.forecastLimiter==='recovery_risk'){score+=16; reasons.push('recovery limiter');}
    if(energy<=3 || drive<=3 || focus<=3){score+=14; reasons.push('very low state');}
    if(Number(seven.energy||0)>0 && Number(seven.energy)<4.5){score+=10; reasons.push('7-day low energy');}
    if(Number(seven.mood||0)>0 && Number(seven.mood)<4.5){score+=8; reasons.push('7-day low mood');}

    if(d.water && score<55) score-=8;
    if(d.dayFood?.morning?.breakfast || d.dayFood?.afternoon?.lunch || d.dayFood?.evening?.dinner) score-=4;

    score=Math.max(0,Math.min(100,Math.round(score)));
    return {score,reasons};
  }catch(e){return {score:0,reasons:[]};}
}

function todayWinTargetTier(win,deep,d=day()){

  if(cap<32) return 'floor';
  if(cap<48) return need>=68?'standard':'floor';

function todayWinTierRank(t){return ({floor:0,standard:1,needle:2,elite:3})[t]??1;}
function todayWinLadderAdjustment(win,deep,d=day()){
  const tier=win?.tier||'standard';
  const target=todayWinTargetTier(win,deep,d);
  const rank=todayWinTierRank(tier);
  const targetRank=todayWinTierRank(target);
  const need=todayWinLaneNeedScore(win,deep,d).need;
  const cap=todayWinCapacityScore(deep,d);
  let adj=0;

  if(rank===targetRank) adj+=18;
  else if(Math.abs(rank-targetRank)===1) adj+=6;
  else adj-=18;

  // Too easy for a high-need/high-capacity day should lose; too hard for a low-capacity day should lose harder.
  if(rank<targetRank && need>=70 && cap>=55) adj-=8;
  if(rank>targetRank && cap<50) adj-=18;

  // Elite is only for high-capacity/high-need days.
  if(tier==='elite' && !(cap>=72 && need>=72)) adj-=35;
  if(tier==='elite' && cap>=78 && need>=82) adj+=22;

  // Floor can still be correct in a bad state; not a punishment.
  if(tier==='floor' && cap<40) adj+=12;
  if(tier==='floor' && cap>=70 && need>=55) adj-=12;

  return adj;
}

  if(d.water && /water/i.test(win.text)) score-=6;

function computeDailyMinimumWinItems(d=day()){
  d=migrateDay(d||day());
  const deep=minimumWinDeepContext(d);
  const groupsNeeded=[];
  const pushGroup=g=>{if(g&&!groupsNeeded.includes(g)) groupsNeeded.push(g);};

  if(deep.drift.recovery || deep.drift.body || deep.energy<=4 || deep.drive<=4) pushGroup('body_recovery');
  if(deep.drift.azure || deep.drift.money) pushGroup('future');
  if(deep.drift.father || deep.drift.fatherRepair || deep.drift.presence) pushGroup('relationship');
  if(deep.drift.environment || deep.drift.faith) pushGroup('support');

  // Default daily shape: one physical/recovery win, one future/career/money win, one relationship/fatherhood/presence win.
  ['body_recovery','future','relationship'].forEach(pushGroup);

  const scored=TODAY_WIN_LIBRARY
    .map(w=>({...w,group:todayWinGroup(w),score:scoreTodayWinCandidate(w,deep,d)}))
    .filter(w=>!/\b2\s*minute\b/i.test(w.text||''))
    .filter(w=>!isBadDailyMinimumWinCandidate(w))
    .filter(w=>todayWinEvidenceGate(w,deep,d))
    .sort((a,b)=>b.score-a.score);

  const picked=[];
  const usedGroups=new Set();
  const pickGroup=(group)=>{
    const w=scored.find(x=>x.group===group && !picked.some(p=>p.id===x.id));
    if(w){picked.push(w); usedGroups.add(group);}
  };

  groupsNeeded.forEach(group=>{if(picked.length<3 && !usedGroups.has(group)) pickGroup(group);});

  // If there are still gaps, fill with the strongest remaining win without duplicating a group first.
  scored.forEach(w=>{
    if(picked.length<3 && !picked.some(p=>p.id===w.id) && !usedGroups.has(w.group)){
      picked.push(w); usedGroups.add(w.group);
    }
  });
  scored.forEach(w=>{
    if(picked.length<3 && !picked.some(p=>p.id===w.id)) picked.push(w);
  });

  return picked.slice(0,3).map(w=>({label:todayWinCandidateText(w,deep,d),baseLabel:w.text,why:`${w.lane} · ${w.tier||'standard'} · ${Math.round(w.score)} · target ${todayWinTargetTier(w,deep,d)}`,type:w.lane,lane:w.lane,group:w.group,id:w.id,score:Math.round(w.score),tier:w.tier||'standard',targetTier:todayWinTargetTier(w,deep,d),needScore:todayWinLaneNeedScore(w,deep,d).need,capacityScore:todayWinCapacityScore(deep,d),caffeineRule:w.caffeineRule||''}));
}
// Today Wins are whole-day floor wins: built from previous night, 7/30-day trends, forecast limiter, recovery risk, energy/drive/focus, and domain drift. They are not time-block closeout tasks.
function minimumWinItems(d=day()){
  d=migrateDay(d||day());

  d.minimumWins=d.minimumWins||null;
  const needsNew=!d.minimumWins || d.minimumWins.date!==k || d.minimumWins.version!=='today_win_library_precise_caffeine_sync_v9' || !Array.isArray(d.minimumWins.items);
  if(needsNew){
    d.minimumWins={
      date:k,
      version:'today_win_library_precise_caffeine_sync_v9',
      createdAt:new Date().toISOString(),
      context:minimumWinDeepContext(d),
      items:computeDailyMinimumWinItems(d)

  }
  return d.minimumWins.items||computeDailyMinimumWinItems(d);
}

function inferWinLaneFromMove(obj={}){
  const txt=winTextNorm([obj.move,obj.text,obj.title,obj.category,obj.type,obj.domain,obj.moveDomain,(obj.tags||[]).join(' ')].join(' '));
  // Recovery must be checked before body because water/caffeine moves are recovery when caffeine/sleep is present.
  if(/caffeine|sleep|bedtime|phone|shower|closeout|recovery|runway|water protein|water and food|switch to water|no more caffeine|pause caffeine/.test(txt)) return 'recovery';
  if(/azure|lab|github|commit|resume|career|cli|portal|screenshot|cloud|proof/.test(txt)) return 'career';
  if(/money|spend|budget|bill|account|debt|saving|expense|property|asset/.test(txt)) return 'money';
  if(/adaya|father|dad|daughter|lesson|repair|reconnect|read|bedtime comfort|play/.test(txt)) return 'father';
  if(/workout|walk|mobility|push|pull|core|strength|conditioning|protein|body|posture|squat|lift/.test(txt)) return 'body';
  if(/conversation|compliment|visible|woman|flirt|outfit|groom|social|profile|date|seen/.test(txt)) return 'presence';
  if(/surface|room|laundry|kitchen|desk|trash|car|environment|clothes|tomorrow morning/.test(txt)) return 'environment';
  if(/faith|zion|pray|prayer/.test(txt)) return 'faith';
  if(/journal|mood|confidence|thought|chain/.test(txt)) return 'mind';
  if(/recall|cards|teach|learning|concept|weak topic/.test(txt)) return 'learning';
  return obj.lane || obj.type || '';
}

function caffeineWindowEndMinutes(v){
  return ({none:0,beforeNoon:12*60,after12:13*60,after2:14*60,after4:16*60,after6:18*60})[v||'none'] ?? null;
}
function caffeineRuleForMinimumWin(item){
  const t=winTextNorm(item?.label||item?.text||item?.baseLabel||'');
  if(item?.caffeineRule) return item.caffeineRule;
  if(/no caffeine today|water only/.test(t)) return 'no_caffeine_day';
  if(/stop caffeine by|cutoff/.test(t)) return 'caffeine_cutoff';
  if(/water before caffeine/.test(t)) return 'water_first';
  return '';
}
function parseCaffeineCutoffMinutesFromLabel(label){
  try{
    const m=String(label||'').match(/by\s+(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
    if(!m) return null;
    let h=Number(m[1]||0), min=Number(m[2]||0);
    const ap=String(m[3]||'').toUpperCase();
    if(ap==='PM' && h<12) h+=12;
    if(ap==='AM' && h===12) h=0;
    return h*60+min;
  }catch(e){return null;}
}
function caffeineWinDirectStatus(item,d=day()){
  try{
    d=migrateDay(d||day());
    const rule=caffeineRuleForMinimumWin(item);
    if(!rule) return null;
    const logged=isTodayCaffeineWindowLogged(d);
    const p=d.pattern||{};
    const val=currentDayCaffeineWindow(d,p,todayKey()) || 'none';
    const end=caffeineWindowEndMinutes(val);

    if(rule==='no_caffeine_day'){
      if(logged && val==='none') return {force:true,label:'Done',cls:'good',source:{status:'done',source:'caffeine_window',window:val}};
      if(logged && val!=='none') return {force:true,label:'Open',cls:'warn',contradicts:true,source:{status:'open',source:'caffeine_window',window:val}};
      return null;
    }

    if(rule==='caffeine_cutoff'){
      if(logged && val==='none') return {force:true,label:'Done',cls:'good',source:{status:'done',source:'caffeine_window',window:val}};
      if(logged){
        const cutoff=parseCaffeineCutoffMinutesFromLabel(item?.label||item?.text||'') ?? timeStringToMinutes(targetSleepTimeValue())-(6*60);
        return (end!==null && end<=cutoff)
          ? {force:true,label:'Done',cls:'good',source:{status:'done',source:'caffeine_window',window:val,cutoff}}
          : {force:true,label:'Open',cls:'warn',source:{status:'open',source:'caffeine_window',window:val,cutoff}};
      }
      return null;
    }

    if(rule==='water_first'){
      if(d.water) return {force:true,label:'Done',cls:'good',source:{status:'done',source:'water_check'}};
      return null;
    }
  }catch(e){}
  return null;
}

function abstainWinDirectStatus(item,d=day()){
  try{
    d=migrateDay(d||day());
    const label=winTextNorm(item?.label||item?.text||item?.baseLabel||'');

    // Caffeine abstain/cutoff is handled by the precise caffeine rule, but this converts a contradiction into Pivot instead of plain Open.
    const caf=caffeineWinDirectStatus(item,d);
    if(caf?.contradicts){
      return pivotWinStatus('Pivot','No more caffeine today; water + protein',{status:'pivot',source:'caffeine_window',window:caf.source?.window||''});
    }

    // Screens / phone / sleep runway: if the app has evidence screens already broke the plan, pivot to the best recovery version left.
    const latePhone=!!(d.pattern?.latePhone || d.pattern?.phoneAfterBedtime || d.pattern?.tonight?.latePhone || d.pattern?.tonight?.phoneAfterBedtime);
    const phoneAway=!!(d.pattern?.phoneAway || d.pattern?.tonight?.phoneAway);
    if(/cut screens|phone away|sleep runway|put the phone away|set bedtime/.test(label)){
      if(latePhone && !phoneAway) return pivotWinStatus('Pivot','Put phone away now; start sleep runway',{status:'pivot',source:'screen_phone'});
    }

    // Stop adding tasks / closeout protection: if new-task drift is logged, pivot to a hard stop.
    const newTasks=!!(d.pattern?.newTasksAfterCloseout || d.pattern?.tonight?.newTasksAfterCloseout || d.pattern?.taskSpiral || d.therapy?.overwhelm>=7);
    if(/stop adding tasks|lighter closeout|protect sleep/.test(label)){
      if(newTasks) return pivotWinStatus('Pivot','Hard stop: no more tasks today',{status:'pivot',source:'task_spiral'});
    }

    // Money boundary / money leak: if spending already broke the plan, pivot to damage control.
    const money=d.moneyDiscipline||d.moneyState||d.moneyLog||{};
    const spendingSlip=!!(money.unplannedSpend || money.overspend || money.impulseSpend || money.unnecessaryExpense || money.boundaryBroken || d.pattern?.moneyLeak);
    if(/spending boundary|cut one money leak|unnecessary expense|money leak/.test(label)){
      if(spendingSlip) return pivotWinStatus('Pivot','No more unnecessary spending today',{status:'pivot',source:'money_boundary'});
    }

    // Food quality abstain-style pivots for any current/future library wins that tell the user to avoid fast food/sugar/heavy carbs.
    const fastFood=!!(d.health?.fastFood || anyDayFood(d,'fastFood'));
    const sugar=!!(d.health?.sugar || anyDayFood(d,'sugar') || anyDayFood(d,'snack'));
    const heavyCarbs=!!(d.health?.heavyCarbs || anyDayFood(d,'heavyCarbs'));
    if(/avoid fast food|no fast food|cut fast food/.test(label) && fastFood){
      return pivotWinStatus('Pivot','Protein + water next meal',{status:'pivot',source:'fast_food'});
    }
    if(/avoid sugar|no sugar|cut sugar|no snacks|sugar/.test(label) && sugar){
      return pivotWinStatus('Pivot','Protein + water next; no more sugar today',{status:'pivot',source:'sugar'});
    }
    if(/avoid heavy carbs|no heavy carbs|cut heavy carbs/.test(label) && heavyCarbs){
      return pivotWinStatus('Pivot','Protein + lighter next meal',{status:'pivot',source:'heavy_carbs'});
    }

  }catch(e){}
  return null;
}

function inferMinimumWinStatusFromDailyFields(item,d=day()){
  const lane=item?.type || item?.lane || '';
  const group=item?.group || todayWinGroup(item);
  const label=winTextNorm(item?.label||item?.text||'');
  try{
    const pivotStatus=abstainWinDirectStatus(item,d);
    if(pivotStatus) return pivotStatus;
    const caffeineStatus=caffeineWinDirectStatus(item,d);
    if(caffeineStatus?.force) return caffeineStatus;
    if(caffeineRuleForMinimumWin(item)) return null;

    if(lane==='body' || group==='body_recovery'){
      const protein=hasProteinMeal(d);
      const body=hasBodyTrainingEvidence(d);
      const water=!!(d.water || anyDayFood(d,'water'));
      if(/protein/.test(label) && /workout|planned/.test(label)){
        if(protein && body) return todayWinStatus('Done','good',{status:'done',source:'body_plus_protein'});
        if(protein || body) return todayWinStatus('Covered','covered',{status:'covered',source:'partial_body_protein'});
        return null;
      }
      if(/protein|meal|food/.test(label)){
        if(protein || hasAnyMeal(d)) return todayWinStatus('Done','good',{status:'done',source:'food_check'});
        return null;
      }
      if(/walk after eating/.test(label)){
        if(body && hasAnyMeal(d)) return todayWinStatus('Done','good',{status:'done',source:'walk_after_food'});
        if(body || hasAnyMeal(d)) return todayWinStatus('Covered','covered',{status:'covered',source:'partial_walk_food'});
        return null;
      }
      if(/strength|lift|planned workout|strength workout|hard body set|strength sets/.test(label) && !/walk|mobility|stretch|posture|body move|activation|break/.test(label)){
        if(hasStrengthWorkoutEvidence(d)) return todayWinStatus('Done','good',{status:'done',source:'strength_workout'});
        return null;
      }
      if(/workout|conditioning|walk|mobility|body|push|pull|core|squat|training|posture|movement|stretch|activation/.test(label)){
        if(body) return todayWinStatus('Done','good',{status:'done',source:'movement_check'});
        return null;
      }
      if(/water|hydrate|hydration/.test(label) && water) return todayWinStatus('Done','good',{status:'done',source:'water_check'});
    }

    if(lane==='recovery'){
      if(/shower/.test(label) && hasShowerOrOutfitEvidence(d)) return todayWinStatus('Done','good',{status:'done',source:'shower_check'});
      if(/sleep|bedtime|phone|closeout|runway|room|screens/.test(label) && (d.night || d.pattern?.tonight?.bedtime || d.pattern?.phoneAway || d.sleep>=7)) return todayWinStatus('Done','good',{status:'done',source:'night_check'});
      if(/water|food|protein/.test(label) && (d.water || hasAnyMeal(d))) return todayWinStatus('Done','good',{status:'done',source:'recovery_food_water'});
    }

    if(lane==='career' || lane==='learning'){
      const az=hasAzureProofEvidence(d,label);
      if(az) return az;
    }

    if(lane==='money') return hasMoneyEvidence(d,label);
    if(lane==='father') return hasFatherEvidence(d,label);
    if(lane==='presence') return hasPresenceEvidence(d,label);
    if(lane==='environment') return hasEnvironmentEvidence(d,label);
    if(lane==='faith') return hasFaithEvidence(d,label);
    if(lane==='mind') return hasMindEvidence(d,label);
  }catch(e){}
  return null;
}

function inferMinimumWinStatusFromCompletedPeakActions(item,d=day()){
  try{
    if(shouldBlockPeakCoverageDueToPivot(item,d)) return null;
    const actions=(d.forecastActions||[]).filter(a=>a && forecastActionLifecycle(a)==='done' && !a.undone);
    if(!actions.length) return null;
    const itemText=winTextNorm(item?.label||item?.text||'');
    const itemId=item?.id||'';
    for(const action of actions){
      const actionText=winTextNorm(action?.move||action?.text||action?.title||'');
      const actionId=action?.moveId||action?.id||'';
      const exact=(actionId && itemId && actionId===itemId) || (!!actionText && actionText===itemText);
      const strongText=(actionText && itemText && (actionText.includes(itemText) || itemText.includes(actionText)));
      const family=winActionStrongMatch(item,action);
      if(exact || strongText) return {label:'Done',cls:'good',source:{status:'done',source:'peak_action',actionId:action.id,reason:exact?'exact':'strong_text'}};
      if(family) return {label:'Covered',cls:'covered',source:{status:'covered',source:'peak_action',actionId:action.id,reason:'same_family'}};
    }
  }catch(e){}
  return null;
}
function backfillMinimumWinStatusFromCompletedPeakActions(d=day()){
  try{
    const mw=ensureMinimumWinState(d);
    const items=mw.items||[];
    const actions=(d.forecastActions||[]).filter(a=>a && forecastActionLifecycle(a)==='done' && !a.undone);
    if(!items.length || !actions.length) return false;
    let changed=false;
    const now=new Date().toISOString();
    items.forEach(item=>{
      const key=minimumWinKey(item);
      const current=mw.status?.[key];
      if(current?.status==='done') return;
      const inferred=inferMinimumWinStatusFromCompletedPeakActions(item,d);
      if(!inferred) return;
      mw.status[key]={
        status:inferred.source.status,
        actionId:inferred.source.actionId||'',
        moveId:'',
        move:'',
        coveredAt:now,
        reason:inferred.source.reason||'peak_action_render_backfill',
        linkedStrength:inferred.source.status==='covered'?'similar':'direct',
        source:'peak_action_backfill'
      };
      changed=true;
    });
    return changed;
  }catch(e){return false;}
}

  }
  return st;
}

function minimumWinStatusForItem(item,d=day()){
  const mw=ensureMinimumWinState(d);
  const key=minimumWinKey(item);
  const s=mw.status?.[key];
  if(s?.status==='done' && s?.manual) return {label:'Done',cls:'good',source:s};
  const pivotStatus=abstainWinDirectStatus(item,d);
  if(pivotStatus) return pivotStatus;
  const caffeineStatus=caffeineWinDirectStatus(item,d);
  if(caffeineStatus?.force) return caffeineStatus;
  if(s?.status==='covered' || (s?.status==='done' && !s?.manual)) return {label:'Covered',cls:'covered',source:Object.assign({},s,{status:'covered',auto:!s?.manual})};
  const dailyStatus=normalizeAutoMinimumWinStatus(inferMinimumWinStatusFromDailyFields(item,d));
  if(dailyStatus) return dailyStatus;
  const peakStatus=normalizeAutoMinimumWinStatus(inferMinimumWinStatusFromCompletedPeakActions(item,d));
  if(peakStatus) return peakStatus;
  return {label:'Open',cls:'warn',source:null};
}

  if(/sleep|bedtime|phone away|sleep runway|closeout/.test(t)) return 'recovery_sleep';

function matchForecastActionToMinimumWins(action,d=day()){

  }
  if(type==='resume_bullet'){

function azureProofRecommendation(ctx=null){
  const p=ensureAzureProofState();
  const prog=azureProofProgress();
  const skill=p.currentSkill || prog.nextSkill?.skill || 'Azure proof';
  const rec=azureSkillProofRecord(skill);
  const idx=azureProofStageIndex(rec.stage);
  const low=ctx ? (ctx.lowState||ctx.veryLowState||ctx.focus<=4||ctx.drive<=4) : false;
  const green=ctx ? (ctx.goodState && ctx.focus>=6 && ctx.drive>=5) : false;
  if(low) return {skill,kind:'tiny_review',minutes:5,text:`Tiny Azure review: explain ${skill} in plain English for 5 minutes.`};
  if(idx<=0) return {skill,kind:'practice',minutes:15,text:`Practice ${skill}: one small portal/lab rep.`};
  if(idx===1) return {skill,kind:'built_once',minutes:15,text:`Build ${skill} once in a lab or portal rep.`};
  if(idx===2) return {skill,kind:'break_fix',minutes:20,text:`Break/fix proof: intentionally test or troubleshoot ${skill}.`};
  if(idx===3) return {skill,kind:'screenshot',minutes:10,text:`Save proof: screenshot or note for ${skill}.`};
  if(idx===4) return {skill,kind:'explain',minutes:10,text:`Explain from memory: ${skill}, what it does, and when to use it.`};
  if(idx===5 || green) return {skill,kind:'resume_bullet',minutes:15,text:`Turn ${skill} into one resume/interview bullet.`};
  return {skill,kind:'proof',minutes:15,text:`Do one proof rep for ${skill}.`};
}

function defaultLearningState(){
  return {cards:[],reps:[],currentTopic:'',weakTopics:[],lastReviewAt:null};
}
function ensureLearningState(){
  state.learning=state.learning||defaultLearningState();
  const def=defaultLearningState();
  Object.keys(def).forEach(k=>{if(!(k in state.learning)) state.learning[k]=deepClone(def[k]);});
  if(!Array.isArray(state.learning.cards)) state.learning.cards=[];
  if(!Array.isArray(state.learning.reps)) state.learning.reps=[];
  if(!Array.isArray(state.learning.weakTopics)) state.learning.weakTopics=[];
  return state.learning;
}
const LEARNING_REP_TYPES=[
  {key:'retrieval',label:'Retrieval practice',credit:'remember without looking'},
  {key:'spaced_review',label:'Spaced review',credit:'review due card'},
  {key:'explain_memory',label:'Explain from memory',credit:'teach it plainly'},
  {key:'weak_topic',label:'Weak-topic loop',credit:'attack the gap'},
  {key:'applied',label:'Apply / lab',credit:'use it in a real task'},
  {key:'teach_back',label:'Teach-back ready',credit:'explain + defend'}
];
function learningRepLabel(type){
  const hit=LEARNING_REP_TYPES.find(x=>x.key===type);
  return hit?hit.label:'Learning rep';
}
function learningTodayTopic(){
  const l=ensureLearningState();
  const az=typeof azureProofProgress==='function'?azureProofProgress():null;
  return l.currentTopic || az?.nextSkill?.skill || l.weakTopics.find(x=>x.status!=='closed')?.topic || 'current Azure topic';
}
function learningDueCards(dateKey=todayKey()){
  const l=ensureLearningState();
  return l.cards.filter(c=>!c.archived && (!c.dueDate || c.dueDate<=dateKey)).sort((a,b)=>String(a.dueDate||'').localeCompare(String(b.dueDate||'')));
}
function learningCardStrengthLabel(card){
  const ease=Number(card?.ease||2.2);
  const interval=Number(card?.intervalDays||0);
  if((card?.reviews||0)>=5 && ease>=2.4 && interval>=14) return 'Defendable';
  if((card?.reviews||0)>=3 && interval>=7) return 'Strong';
  if((card?.reviews||0)>=1) return 'Learning';
  return 'New';
}
function addLearningCard(topic='',question='',answer=''){
  const l=ensureLearningState();
  topic=String(topic||learningTodayTopic()).trim();
  question=String(question||'Explain the main idea without looking.').trim();
  answer=String(answer||'').trim();
  l.cards.push({id:'lc_'+Date.now(),topic,question,answer,createdAt:new Date().toISOString(),dueDate:todayKey(),reviews:0,ease:2.2,intervalDays:0,lapses:0,lastResult:null});
  l.currentTopic=topic;
  save(); render();
}
function reviewLearningCard(id,result='good'){
  const l=ensureLearningState();
  const c=l.cards.find(x=>x.id===id);
  if(!c) return;
  const now=new Date().toISOString();
  const map={again:1,hard:2,good:4,easy:7};
  let interval=map[result]||4;
  c.reviews=Number(c.reviews||0)+1;
  c.lastReviewedAt=now;
  c.lastResult=result;
  if(result==='again'){c.lapses=Number(c.lapses||0)+1; c.ease=Math.max(1.3,Number(c.ease||2.2)-.25);}
  if(result==='hard') c.ease=Math.max(1.5,Number(c.ease||2.2)-.1);
  if(result==='good') c.ease=Math.min(3,Number(c.ease||2.2)+.05);
  if(result==='easy') c.ease=Math.min(3.2,Number(c.ease||2.2)+.15);
  if(c.reviews>1 && result!=='again') interval=Math.max(interval,Math.round((Number(c.intervalDays)||1)*Number(c.ease||2.2)));
  c.intervalDays=interval;
  c.dueDate=offsetDateKey(todayKey(),interval);
  l.lastReviewAt=now;
  logLearningRep('spaced_review',c.topic,{cardId:id,result,intervalDays:interval});
}
function logLearningRep(type='retrieval',topic='',extra={}){
  const l=ensureLearningState();
  topic=String(topic||learningTodayTopic()).trim();
  const now=new Date().toISOString();
  const entry={id:'lr_'+Date.now(),date:todayKey(),period:currentGuidePeriod().key,type,label:learningRepLabel(type),topic,at:now,...extra};
  l.reps.push(entry);
  l.reps=l.reps.slice(-300);
  l.currentTopic=topic;
  l.lastReviewAt=now;
  const d=day();
  d.azure=true;
  d.azureLoggedAt=d.azureLoggedAt||now;
  d._logged=d._logged||{};
  d._logged.azure=true;
  d._logged['learning.'+type]=true;
  if(!Array.isArray(d.azureSessions)) d.azureSessions=[];
  d.azureSessions.push({date:todayKey(),time:now,type:'learning',learningType:type,topic});
  if(type==='weak_topic') addLearningWeakTopic(topic,false);
  save(); render();
}
function addLearningWeakTopic(topic='',doRender=true){
  const l=ensureLearningState();

  if(!topic) return;
  if(!l.weakTopics.some(x=>x.topic.toLowerCase()===topic.toLowerCase() && x.status!=='closed')){
    l.weakTopics.push({topic,addedAt:new Date().toISOString(),status:'open'});
  }
  l.currentTopic=topic;
  if(doRender){save(); render();}
}

function learningRepCounts(entries=recentEntries(7)){
  const allowedDates=new Set((entries||[]).map(e=>e.date));
  const reps=ensureLearningState().reps.filter(r=>allowedDates.has(r.date));
  const counts={};
  LEARNING_REP_TYPES.forEach(t=>counts[t.key]=0);
  reps.forEach(r=>{counts[r.type]=(counts[r.type]||0)+1;});
  return {reps,counts,total:reps.length};
}
function learningKnowledgeOverview(entries=recentEntries(7)){
  const l=ensureLearningState();
  const repData=learningRepCounts(entries);
  const due=learningDueCards();
  const openWeak=l.weakTopics.filter(x=>x.status!=='closed');
  const cards=l.cards.filter(c=>!c.archived);
  const defendable=cards.filter(c=>learningCardStrengthLabel(c)==='Defendable').length;
  const strong=cards.filter(c=>['Strong','Defendable'].includes(learningCardStrengthLabel(c))).length;
  const rows=(entries||[]).filter(e=>e&&e.data).map(e=>({date:e.date,data:migrateDay(e.data)}));
  const pct2=fn=>rows.length?Math.round(rows.filter(fn).length/rows.length*100):0;
  const score=level5Clamp(1.5 + Math.min(1.2,repData.total/8) + Math.min(.8,cards.length/12) + Math.min(.8,defendable/4) + (openWeak.length?0.25:0));
  return {
    level:score,
    reps7:repData.total,
    repCounts:repData.counts,
    dueCards:due.length,
    cardCount:cards.length,
    strongCards:strong,
    defendableCards:defendable,
    openWeakTopics:openWeak.slice(-20),
    currentTopic:l.currentTopic||learningTodayTopic(),
    rates:{azureLogged:pct2(r=>!!r.data.azure),learningLogged:pct2(r=>(r.data.azureSessions||[]).some(s=>s.type==='learning'))},
    recentReps:l.reps.slice(-30),
    rule:'Level 5 learning means retrieval, spaced review, explain-from-memory, weak-topic loops, and applied proof.'
  };
}
function learningRecommendation(ctx=null){
  const overview=learningKnowledgeOverview(recentEntries(7));
  const topic=learningTodayTopic();
  if(learningDueCards().length) return {type:'spaced_review',topic,text:`Review ${learningDueCards().length} due card${learningDueCards().length===1?'':'s'} for ${topic}.`};
  if(overview.openWeakTopics.length) return {type:'weak_topic',topic:overview.openWeakTopics[0].topic,text:`Weak-topic loop: explain ${overview.openWeakTopics[0].topic}, then test it in one small rep.`};
  if(ctx?.lowState || ctx?.focus<=4) return {type:'retrieval',topic,text:`Low-energy learning: recall ${topic} for 5 minutes without notes.`};
  if(ctx?.goodState && ctx?.focus>=6) return {type:'applied',topic,text:`Apply ${topic}: lab/proof rep, then explain from memory.`};
  return {type:'explain_memory',topic,text:`Explain ${topic} from memory in plain English.`};
}

function adayaSkillKey(cat,skill){return cat+'|'+skill}

function adayaProgressFootprint(obj){
  try{
    const stageScore={'Not Introduced':0,'Exposed Through Play':1,'Practicing With Daddy':2,'Needs Support':2,'Doing Sometimes':3,'Doing Often':4,'Uses On Her Own':5,'Understands + Uses It':5};

function shouldUseImportedAdaya(currentAdaya, importedAdaya){

    if(!currentAdaya || typeof currentAdaya!=='object') return true;
    const current=adayaProgressFootprint(currentAdaya);
    const incoming=adayaProgressFootprint(importedAdaya);
    const incomingNewer=adayaSaveStamp(importedAdaya)>adayaSaveStamp(currentAdaya);
    const incomingLooksReset=current.nonDefault>=10 && incoming.nonDefault===0 && incoming.total>=40;
    const incomingMuchLower=current.nonDefault>=10 && incoming.nonDefault<Math.max(3,Math.floor(current.nonDefault*.35));

    if(incomingNewer) return true;
    return incoming.score>current.score+8 || incoming.nonDefault>current.nonDefault+3;
  }catch(e){

function fatherhoodLevel5Profile(entries=recentEntries(7)){
  const rows=(entries||[]).filter(e=>e&&e.data).map(e=>({date:e.date,data:migrateDay(e.data)}));
  const pct2=fn=>rows.length?Math.round(rows.filter(fn).length/rows.length*100):0;
  const repCounts={};
  fatherhoodRepOptions().forEach(o=>repCounts[o.key]=0);
  rows.forEach(r=>{
    const l5=ensureFatherhoodLevel5Fields(r.data);
    fatherhoodRepOptions().forEach(o=>{if(l5[o.key]) repCounts[o.key]++;});
  });
  const today=ensureFatherhoodLevel5Fields(day());
  const todayReps=fatherhoodRepOptions().filter(o=>today[o.key]).map(o=>o.key);
  const activeConnectionRate=pct2(r=>!!ensureFatherhoodLevel5Fields(r.data).activePlay);
  const repairRate=pct2(r=>!!ensureFatherhoodLevel5Fields(r.data).repair || !!r.data.father?.daily?.repair);
  const warmthRate=pct2(r=>!!ensureFatherhoodLevel5Fields(r.data).warmConnection || !!r.data.father?.daily?.connect || !!r.data.fatherCheck);
  const teachingRate=pct2(r=>!!ensureFatherhoodLevel5Fields(r.data).tinyLesson || !!r.data.father?.daily?.teach || !!r.data.father?.lesson);
  const developmentRate=pct2(r=>!!ensureFatherhoodLevel5Fields(r.data).childDevelopmentRep || !!r.data.father?.lesson);
  const anchorScore=Math.round((warmthRate+teachingRate+repairRate+developmentRate+activeConnectionRate)/5);
  return {
    days:rows.length,
    anchorScore,
    todayReps,
    repCounts,
    rates:{warmth:warmthRate,activeConnection:activeConnectionRate,repair:repairRate,teaching:teachingRate,developmentRep:developmentRate},
    current:{reps:todayReps,repCount:todayReps.length,tinyLessonDone:tinyLessonDoneCount(day())>0,currentTinyLessonDone:!!today.currentLessonDone,tinyLessonCount:tinyLessonDoneCount(day()),tinyLessonSuggested:!!day().father?.lesson,childDevelopmentRep:today.childDevelopmentRep||'',repairNote:today.repairNote||'',dadAnchorNote:today.dadAnchorNote||''},
    adayaOverall:typeof overallAdayaProgress==='function'?overallAdayaProgress():null,
    topGrowthNeed:fatherhoodTopGrowthNeed(),
    rule:'Level 5 fatherhood means warmth, active connection, development reps, repair, and noticing effort without shame.'
  };
}
function fatherhoodTopGrowthNeed(){
  try{
    const rows=Object.keys(ADAYA_CATEGORIES).map(cat=>({cat,progress:categoryProgress(cat)})).sort((a,b)=>a.progress-b.progress);
    return rows[0]||null;
  }catch(e){return null;}
}
function fatherhoodBestRepRecommendation(ctx=null){
  const prof=fatherhoodLevel5Profile(recentEntries(7));
  const d=day(), l5=ensureFatherhoodLevel5Fields(d);
  if(!l5.warmConnection && (ctx?.periodKey==='evening'||ctx?.lowState)) return {key:'warmConnection',text:'Warm connection: 5 minutes of full attention with Adaya.'};
  if(!l5.activePlay && !ctx?.actions?.workout && ctx?.periodKey!=='morning') return {key:'activePlay',text:'Active Adaya connection: play, walk, dance, or chase for 5 minutes.'};
  if(!l5.repair && (d.father?.daily?.repair || ctx?.irritability>=7)) return {key:'repair',text:'Repair rep: calm words, reconnect, and move forward.'};
  if(!l5.tinyLesson) return {key:'tinyLesson',text:`Tiny lesson: ${currentTinyLessonMeta().title||'one play-based lesson'}`};
  if(!l5.noticedEffort) return {key:'noticedEffort',text:'Notice effort: name one thing she tried or improved.'};
  return {key:'readTalk',text:'Read/talk rep: one short story, question, or conversation.'};
}

function ensureFaithLevel5Fields(d=day()){

function faithMeaningRepOptions(){

function faithMeaningRepLabel(key){

function faithMeaningScoreForDay(d=day()){
  const f=ensureFaithLevel5Fields(d);
  let score=0;
  if(f.minimum || faithMinimumDone(d.faith||defaultFaithDay())) score+=2;
  if(f.meaningLine || d.faith?.foundationRep) score+=1;
  if(f.directionPrayer || d.faith?.prayer) score+=1;
  if(f.zionStep || d.faith?.studiedSubject || d.faith?.gotSignature) score+=1;
  if(f.serviceCompassion) score+=1;
  if(f.gratitude) score+=1;
  if(f.pressureRelease) score+=1;
  if(f.integrated) score+=2;
  return Math.min(10,score);
}
function faithMeaningStageFromScore(score){
  score=Number(score)||0;
  if(score>=8) return 'Integrated';
  if(score>=6) return 'Built';
  if(score>=4) return 'Aligned';
  if(score>=2) return 'Minimum Rep';
  return 'Dormant';
}
function faithMeaningProfile(entries=recentEntries(7)){
  const rows=(entries||[]).filter(e=>e&&e.data).map(e=>({date:e.date,data:migrateDay(e.data)}));
  const pct2=fn=>rows.length?Math.round(rows.filter(fn).length/rows.length*100):0;
  const scores=rows.map(r=>faithMeaningScoreForDay(r.data));
  const current=ensureFaithLevel5Fields(day());
  const currentScore=faithMeaningScoreForDay(day());
  const repCounts={};
  faithMeaningRepOptions().forEach(o=>repCounts[o.key]=0);
  rows.forEach(r=>{
    const f=ensureFaithLevel5Fields(r.data);
    faithMeaningRepOptions().forEach(o=>{if(f[o.key]) repCounts[o.key]++;});
  });
  return {
    days:rows.length,
    current:{score:currentScore,stage:faithMeaningStageFromScore(currentScore),reps:faithMeaningRepOptions().filter(o=>current[o.key]).map(o=>o.key),meaningText:current.meaningText||'',alignmentNote:current.alignmentNote||''},
    averageScore:average(scores),
    repCounts,
    rates:{
      minimum:pct2(r=>faithMinimumDone(r.data.faith||defaultFaithDay())||!!ensureFaithLevel5Fields(r.data).minimum),
      meaningLine:pct2(r=>!!ensureFaithLevel5Fields(r.data).meaningLine || !!r.data.faith?.foundationRep),
      prayer:pct2(r=>!!ensureFaithLevel5Fields(r.data).directionPrayer || !!r.data.faith?.prayer),
      zionStep:pct2(r=>!!ensureFaithLevel5Fields(r.data).zionStep || !!r.data.faith?.studiedSubject || !!r.data.faith?.gotSignature),
      pressureRelease:pct2(r=>!!ensureFaithLevel5Fields(r.data).pressureRelease),
      integrated:pct2(r=>!!ensureFaithLevel5Fields(r.data).integrated)
    },
    progress:{current:deepClone(faithProgressState()),completed:faithCompletedWithToday(),total:faithTotalSubjects()},
    rule:'Level 5 faith means meaning, direction, minimum reps, Zion progress, compassion, and pressure release without guilt.'
  };
}
function logFaithMeaningRep(key){
  const d=day(), f=d.faith||(d.faith=defaultFaithDay()), l5=ensureFaithLevel5Fields(d);
  l5[key]=true;
  l5.at=new Date().toISOString();

  l5.repLog=l5.repLog.slice(-40);
  if(key==='minimum'){f.minimumRep=true; f.faithRepLogged=true;}
  if(key==='meaningLine'){f.foundationRep=true;}
  if(key==='directionPrayer'){f.prayer=true;}
  if(key==='zionStep'){f.studiedSubject=true;}
  if(key==='pressureRelease'){f.preachingPaused=true;}
  if(['minimum','meaningLine','directionPrayer','zionStep'].includes(key)){
    f.faithRepLogged=true; f.minimumRep=true;
  }
  d._logged=d._logged||{};
  d._logged['faith.level5.'+key]=true;
  d._logged['faith.minimumRep']=faithMinimumDone(f);

}

function sleepFromPattern(p){
  if(!p?.bedtime || !p?.wakeTime) return null;
  const [bh,bm]=(p.bedtime||'').split(':').map(Number), [wh,wm]=(p.wakeTime||'').split(':').map(Number);
  if([bh,bm,wh,wm].some(Number.isNaN)) return null;
  let b=bh*60+bm, w=wh*60+wm;
  if(w<=b) w+=1440;
  return Math.round(((w-b)/60)*4)/4;
}
function syncSleepFromPattern(){
  const d=day();
  const h=sleepFromPattern(d.pattern||{});
  if(h!==null){
    d.sleep=h;
    d.sleepSource='night_inputs';
    d.sleepSourceLabel='Last night bedtime/wake time';
    d._logged=d._logged||{};
    d._logged.sleep=true;
  }
  return h;
}
function syncLinkedFieldsForDay(d){
  if(!d) d=day();
  if(!d) return d;
  migrateDay(d);
  const p=d.pattern||(d.pattern=defaultPattern());
  const h=d.health||(d.health={hydration:0,fastFood:false,sunlight:false,rest:false});
  const md=d.moneyDiscipline||(d.moneyDiscipline={avoidLifestyle:false,protectCar:false,protectProperty:false,avoidRandom:false,nextMove:''});
  const f=d.father||(d.father={daily:{},obs:{}});
  f.daily=f.daily||{};
  const soc=d.social||(d.social={realConversation:false,publicSpace:false,compliment:false,selfRespect:false});
  const th=d.therapy||(d.therapy={});
  d._logged=d._logged||{};

  // Highest priority: Last night bedtime/wake time controls Today > Sleep hours.
  const isTodayRecord = !!(state.days && d===state.days[todayKey()]);
  if(isTodayRecord) syncActualLastNightIntoToday();
  const lastNightCtx = isTodayRecord ? actualLastNightContext(false) : null;
  const hSleep=sleepFromPattern(lastNightCtx?.record || p);
  if(hSleep!==null){
    d.sleep=hSleep;
    d.sleepSource='night_inputs';
    d.sleepSourceLabel='Last night bedtime/wake time';
    d._logged.sleep=true;
  }

  // Duplicate/overlapping fields stay connected. True values flow across the app; false does not erase another checked area.
  if(p.latePhone || p.phoneLate){p.phoneLate=true; p.latePhone=true;}
  if(p.tonight){
    if(p.tonight.latePhone || p.tonight.phoneLate){p.tonight.phoneLate=true; p.tonight.latePhone=true;}
  }
  p.lateCaffeine=['after2','after4','after6'].includes(p.caffeineWindow);
  if(p.lateCaffeine){
    p.lateCaffeine=true;
    if(d.coffee==='ok') d.coffee='too late';
  }
  const df=d.dayFood||defaultDayFood();
  syncAutomaticMorningNoBreakfast(d);
  const dayFoodAnyWater=Object.values(df).some(x=>x&&x.water);
  const dayFoodAnyFastFood=Object.values(df).some(x=>x&&x.fastFood);
  if(dayFoodAnyWater) d.water=true;
  if(dayFoodAnyFastFood) h.fastFood=true;
  if(Number(h.hydration||0)>0) d.water=true;
  if(d.water && Number(h.hydration||0)<1) h.hydration=1;
  if(h.movementStage && h.movementStage!=='none'){d.workout=true; p.workoutWalk=true;}
  if(d.workout || p.workoutWalk){d.workout=true; p.workoutWalk=true;}
  if(h.sunlight || p.sunlight){h.sunlight=true; p.sunlight=true;}

function moodTimelineSignalFromNote(note){
  const n=String(note||'').toLowerCase();
  const has=(words)=>words.some(w=>n.includes(w));
  if(has(['walk','outside','sun','patio','porch','fresh air'])) return {kind:'lifter', label:'Outside/walk lifted mood', tag:'outside_walk'};
  if(has(['piano','music','lesson'])) return {kind:'lifter', label:'Music/piano lifted mood', tag:'music'};
  if(has(['adaya','daughter','baby','photos','videos','facetime','video chat'])) return {kind:'lifter', label:'Adaya connection lifted mood', tag:'adaya'};
  if(has(['pray','prayer','church','sermon','worship','pastor','god'])) return {kind:'spiritual', label:'Church/spiritual context noted', tag:'church'};
  if(has(['study','azure','it learning','python','learn','learning'])) return {kind:'lifter', label:'Learning helped mood', tag:'learning'};
  if(has(['shower','groom','teeth','deodorant','clean shirt','washed hair'])) return {kind:'lifter', label:'Grooming reset helped mood', tag:'grooming'};
  if(has(['social media','scroll','tiktok','reels','facebook','instagram'])) return {kind:'drain', label:'Scrolling pulled mood down', tag:'scrolling'};
  if(has(['argument','angry','replay','conflict','fight','heated'])) return {kind:'drain', label:'Conflict/replay pulled mood down', tag:'conflict'};
  if(has(['bored','checked out','mental escape','don\'t have the mental capacity','dont have the mental capacity'])) return {kind:'drain', label:'Bored/check-out pattern', tag:'boredom'};
  if(has(['money problems','money problem','budget','bill','bills'])) return {kind:'drain', label:'Money worry pulled mood down', tag:'money_worry'};
  if(has(['tired','sluggish','lazy energy','sleepy'])) return {kind:'drain', label:'Tired/sluggish note', tag:'sluggish'};

}
function moodTimelineForecastAnalysis(d=day(), periodKey=currentGuidePeriod().key){
  d=migrateDay(d||day());
  const all=(Array.isArray(d.moodTimeline)?d.moodTimeline:[])
    .map(e=>({...deepClone(e), moodLevel:normalizeMoodTimelineLevel(e)}))
    .filter(e=>Number.isFinite(Number(e.moodLevel)))
    .sort((a,b)=>new Date(a.at||0)-new Date(b.at||0));
  const periodEntries=all.filter(e=>!e.period || e.period===periodKey);
  const entries=periodEntries.length?periodEntries:all;
  const latest=entries.length?entries[entries.length-1]:null;
  const prev=entries.length>=2?entries[entries.length-2]:null;
  const latestLevel=latest?Number(latest.moodLevel):null;
  const prevLevel=prev?Number(prev.moodLevel):null;
  const delta=(latestLevel!==null&&prevLevel!==null)?Math.round((latestLevel-prevLevel)*10)/10:null;
  const low=latestLevel!==null && latestLevel<=4;
  const veryLow=latestLevel!==null && latestLevel<=2;
  const high=latestLevel!==null && latestLevel>=7;
  const improving=delta!==null && delta>=2;
  const dropping=delta!==null && delta<=-2;
  const analyzed=entries.map(e=>({entry:e, signal:moodTimelineSignalFromNote(e.note)})).filter(x=>x.signal);
  const lastLifter=[...analyzed].reverse().find(x=>x.signal.kind==='lifter');
  const lastDrain=[...analyzed].reverse().find(x=>x.signal.kind==='drain');
  const lastSpiritual=[...analyzed].reverse().find(x=>x.signal.kind==='spiritual');
  return {
    count:all.length,
    periodCount:periodEntries.length,
    latest:latest?deepClone(latest):null,
    previous:prev?deepClone(prev):null,
    latestLevel,
    latestLabel:latest?moodTimelineLabel(latestLevel):'',
    previousLevel:prevLevel,
    delta,
    low, veryLow, high, improving, dropping,
    lastLifter:lastLifter?{label:lastLifter.signal.label,tag:lastLifter.signal.tag,level:lastLifter.entry.moodLevel,note:lastLifter.entry.note||'',at:lastLifter.entry.at||'',period:lastLifter.entry.period||''}:null,
    lastDrain:lastDrain?{label:lastDrain.signal.label,tag:lastDrain.signal.tag,level:lastDrain.entry.moodLevel,note:lastDrain.entry.note||'',at:lastDrain.entry.at||'',period:lastDrain.entry.period||''}:null,
    lastSpiritual:lastSpiritual?{label:lastSpiritual.signal.label,tag:lastSpiritual.signal.tag,level:lastSpiritual.entry.moodLevel,note:lastSpiritual.entry.note||'',at:lastSpiritual.entry.at||'',period:lastSpiritual.entry.period||''}:null,
    recent:all.slice(-8).map(e=>({id:e.id,date:e.date,at:e.at,localAt:e.localAt,period:e.period,moodLevel:e.moodLevel,moodLabel:moodTimelineLabel(e.moodLevel),note:e.note||'',signal:moodTimelineSignalFromNote(e.note)}))
  };
}

function energyTimelineDefaultLevel(){

function energyTimelineDraftBaseline(){

function oneTimeEnergy930FixAvailable(entry){
  try{
    if(!entry || !entry.id) return false;
    state.settings=state.settings||{};
    const used=state.settings.oneTimeEnergy930FixUsedFor||'';
    if(String(used).includes(String(entry.id))) return false;
    const p=String(entry.period||'');
    const text=(String(entry.localAt||'')+' '+String(entry.note||entry.contextNote||'')).toLowerCase();
    // Only offer this for an afternoon energy note that looks like today's missed morning/groggy entry.
    return p==='afternoon' && (text.includes('groggy') || text.includes('woke up'));
  }catch(e){return false;}
}

function moveAllowedInPeriod(m,periodKey){

function moveRepetitionPenalty(candidate,actions){

  const sameMoveCount=recent.slice(-4).filter(a=>(a.moveId||forecastMoveIdFromText(a.move))===candidate.id).length;

  if(sameMoveRecent) penalty+=.35;
  if(sameMoveCount>=2) penalty+=.65;
  const repeatSafe=['body','sleep protection','food-specific','damage control'].includes(candidate.category) || candidate.sleepRelated;
  if(candidate.category && !repeatSafe && recent.slice(-3).filter(a=>(a.category||'')===candidate.category).length>=2) penalty+=.35;

function wave2MoveCanonicalText(obj={}){
  return moveNorm([obj.text,obj.move,obj.title,obj.label].filter(Boolean).join(' '))
    .replace(/\b(now|today|then|first|just|quick|small|one|the|a|an|for|to|and)\b/g,' ')

function wave2TokenSet(txt){return new Set(String(txt||'').split(/\s+/).filter(w=>w.length>2));}
function wave2TokenOverlap(a,b){
  const A=wave2TokenSet(a), B=wave2TokenSet(b);
  if(!A.size || !B.size) return 0;
  let hit=0; A.forEach(x=>{if(B.has(x)) hit++;});
  return hit/Math.min(A.size,B.size);
}
function wave2MoveDedupeGroup(obj={}){
  const t=wave2MoveCanonicalText(obj);
  const fam=moveFamilyKey(obj);
  const cat=String(obj.category||obj.moveCategory||'').toLowerCase();
  const type=String(obj.type||obj.moveType||'').toLowerCase();

  const has=(x)=>t.includes(x)||tags.includes(x)||cat.includes(x)||type.includes(x);
  if(has('water') && (has('protein')||has('food')||has('dinner'))) return 'food_water_stabilize';
  if(has('caffeine') || (has('phone') && (has('sleep')||has('boundary')))) return 'recovery_boundary';
  if(has('sleep') || has('bedtime') || has('closeout') || has('runway')) return 'sleep_closeout';

function wave2IsNearDuplicateMove(a={},b={}){
  const at=wave2MoveCanonicalText(a), bt=wave2MoveCanonicalText(b);
  if(!at || !bt) return false;
  if(at===bt) return true;
  if(wave2MoveDedupeGroup(a)===wave2MoveDedupeGroup(b)) return true;
  if(moveFamilyKey(a)===moveFamilyKey(b) && wave2TokenOverlap(at,bt)>=.55) return true;

function wave2MoveGuardrailPenalty(cand={},fc={}){

    const rec=fc.recovery||sleepRecoveryRiskProfile(fc.d||day());
    const period=fc.periodKey||currentGuidePeriod().key;
    const tw=fc.timeWindow?.key||'';

    if(tw==='after_midnight' && !flags.sleep) p+=4;
    if(mode==='Protect'){
      if(flags.high) p+=3.5;
      if(flags.medium && !flags.sleep && !flags.father) p+=1.2;
      if(flags.mission && !flags.tiny && period==='evening') p+=1.5;
      if(flags.social && !flags.low) p+=1.2;
    }
    if(fc.veryLowState && !flags.low) p+=2.2;
    if(fc.lowState && flags.high) p+=2.5;
    const nextAnchor=rec.nextRecoveryAnchor?.key||'';
    if(rec.risk>=70 && flags.high) p+=3.2;
    if(nextAnchor==='phoneBoundary' && (period==='evening' || rec.risk>=70)){
      if(flags.high) p+=1.1;
      if(flags.mission && period==='evening') p+=0.9;
      if(flags.sleep) p-=0.4;
    }
    if(rec.risk>=50 && flags.mission && period==='evening') p+=1.3;
    if(fc.isSaturday && fc.actions?.saturdayKeepLight){
      if(flags.high) p+=3.4;
      if(flags.medium && !(flags.father||flags.faith||flags.sleep)) p+=1.2;
    }
    if(fc.actions?.activeLoad){
      if(flags.high) p+=2.2;
      if(flags.medium && !(flags.sleep||flags.father||flags.faith)) p+=0.8;
    }
    if(flags.mission && (String(cand.type||'').toLowerCase().includes('money') || String(cand.category||'').toLowerCase().includes('money')) && (fc.lowState || mode==='Protect')) p+=0.7;
    return Math.round(p*10)/10;

}
function wave2RecentSimilarityPenalty(cand={},actions=[]){
  try{
    const recent=(actions||[]).filter(a=>!a.undone && a.status!=='undone').slice(-8);
    let p=0;
    recent.slice(-3).forEach(a=>{if(wave2IsNearDuplicateMove(cand,a)) p+=.7;});
    const sameGroup=recent.slice(-6).filter(a=>wave2MoveDedupeGroup(a)===wave2MoveDedupeGroup(cand)).length;

}

    delete d._vals;
