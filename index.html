<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Upload Tailored Training</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0f17;
      color: white;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #151b27;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 16px 50px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 12px; font-size: 28px; }
    p { color: #c8d0dd; line-height: 1.45; }
    a.button {
      display: block;
      margin: 16px 0;
      padding: 16px 18px;
      border-radius: 14px;
      background: #2f81f7;
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
    }
    a.secondary {
      background: #303846;
    }
    .small {
      font-size: 13px;
      color: #9aa4b2;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Upload Tailored Training</h1>
    <p>This shortcut opens the exact GitHub upload page.</p>

    <a class="button" href="intent://github.com/Bill6006/Tailored-Training/upload#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=https%3A%2F%2Fgithub.com%2FBill6006%2FTailored-Training%2Fupload;end">Open in Chrome</a>
    <a class="button secondary" href="https://github.com/Bill6006/Tailored-Training/upload">Open normal link</a>

    <p class="small">https://github.com/Bill6006/Tailored-Training/upload</p>
  </div>
</body>
</html>
